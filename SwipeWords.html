// ── 誤答確認モード ──
function ConfirmMode({ batch, batchNum, totalBatches, fallbackPool, onPass, onFail, variant, csvFileName }) {
  const [questions] = React.useState(() => buildConfirmQuestions(batch, fallbackPool));
  const [idx, setIdx] = React.useState(0);
  const [feedback, setFeedback] = React.useState(null);
  const [retry, setRetry] = React.useState(null);
  const [correct, setCorrect] = React.useState(0);
  const [shake, setShake] = React.useState(false);
  const [edgeFlash, setEdgeFlash] = React.useState('');
  const particlesRef = React.useRef(null);
  const containerRef = React.useRef(null);
  const [judge, setJudge] = React.useState(null);
  const judgeKeyRef = React.useRef(0);
  const lastCorrectRef = React.useRef(null); // 直前に正解した問題（誤答時に次グループへ移動）

  const q = questions[idx];

  // 現在・次の問題の画像をプリロード
  React.useEffect(() => {
    [questions[idx], questions[idx + 1]].forEach(question => {
      if (question?.imageFile && csvFileName) {
        const img = new Image();
        img.src = 'images/' + csvFileName.replace(/\.csv$/i, '') + '/' + question.imageFile;
      }
    });
  }, [idx, questions, csvFileName]);

  const handleAnswer = React.useCallback((answer, dir) => {
    if (!q || feedback || retry) return;
    const isCorrect = answer === q.correct;
    const rightDir = ['up','right','down','left'][q.choices.indexOf(q.correct)];
    setFeedback({ correct: isCorrect, rightDir });
    if (isCorrect) {
      lastCorrectRef.current = batch.find(b => b.word === q.word) || null;
      setCorrect(c => c + 1);
      setEdgeFlash('ok'); setTimeout(() => setEdgeFlash(''), 500);
      judgeKeyRef.current++;
      setJudge({ kind: 'good', label: 'GOOD', key: judgeKeyRef.current });
      setTimeout(() => setJudge(null), 950);
      if (particlesRef.current && containerRef.current) {
        const { clientWidth: w, clientHeight: h } = containerRef.current;
        particlesRef.current.burstConfetti(w/2, h*0.55, { count: 66, colors: ['#5BE3A8','#2BC48A','#FFE680','#fff'] });
      }
      setTimeout(() => {
        setFeedback(null);
        if (idx + 1 >= questions.length) onPass();
        else setIdx(i => i + 1);
      }, 350);
    } else {
      setShake(true); setTimeout(() => setShake(false), 420);
      setEdgeFlash('ng'); setTimeout(() => setEdgeFlash(''), 500);
      judgeKeyRef.current++;
      setJudge({ kind: 'miss', label: 'MISS!', key: judgeKeyRef.current });
      setTimeout(() => setJudge(null), 950);
      if (particlesRef.current && containerRef.current) {
        const { clientWidth: w, clientHeight: h } = containerRef.current;
        particlesRef.current.burstSparks(w/2, h*0.55);
      }
      setRetry({ rightDir });
    }
  }, [q, feedback, retry, idx, questions.length, batch, onPass]);

  const handleRetrySwipe = React.useCallback((answer, dir) => {
    if (!retry || dir !== retry.rightDir) return;
    setRetry(null);
    setFeedback(null);
    onFail(lastCorrectRef.current); // 直前の正解語を渡す
  }, [retry, onFail]);

  if (!q) return null;
  return (
    <div ref={containerRef} className={`vocab-app variant-${variant.id}${shake ? ' shake' : ''}`}>
      <div className={'edge-flash' + (edgeFlash ? ' ' + edgeFlash : '')}/>
      <ParticleCanvas getNode={(api) => { particlesRef.current = api; }}/>
      <div className="confirm-header">確認テスト {batchNum}/{totalBatches}</div>
      {judge && <div className="judge-layer"><div key={judge.key} className={'judge ' + judge.kind}>{judge.label}</div></div>}
      <StatsBar total={questions.length} current={idx} correct={correct} wrong={0} combo={0} bestCombo={0} timeLeft={0} timerMax={0} variant={variant}/>
      {!retry && <SwipeCard key={idx} question={q} onAnswer={handleAnswer} variant={variant} disabled={!!feedback} feedback={feedback} onPlaySound={() => playComboSound(correct + 1)} onPlayWrong={playBooSound} nextQuestion={questions[idx + 1]} remaining={questions.length - idx - 1}/>}
      {retry && <SwipeCard key={`r${idx}`} question={q} onAnswer={handleRetrySwipe} variant={variant} disabled={false} feedback={null} retryMode rightDir={retry.rightDir} onPlaySound={playOkSound} nextQuestion={questions[idx + 1]} remaining={questions.length - idx - 1} csvFileName={csvFileName}/>}
    </div>
  );
}

// ── 結果モード ──
function ResultMode({ sessionStats, missedWords, vocabData, csvFileName, vocabName, onRetry, onRestart, onExport, variant }) {
  const [globalStats, setGlobalStats] = React.useState(null);
  const [sessionElapsedSec, setSessionElapsedSec] = React.useState(null);
  const savedRef = React.useRef(false);
  React.useEffect(() => {
    if (!vocabData || !sessionStats || savedRef.current) return;
    savedRef.current = true;

    // セッション記録を保存
    // 学習時間 = 学習開始〜終了画面表示までの壁時計秒数
    const startMs = sessionStats.sessionStartMs || Date.now();
    const elapsedSec = Math.round((Date.now() - startMs) / 1000);
    setSessionElapsedSec(elapsedSec);
    const ts = new Date(startMs);
    const sessionRow = {
      date: fmtDate(ts), time: fmtTime(ts),
      csvFileName: csvFileName || '',
      total: sessionStats.total,
      correct: sessionStats.correct,
      wrong: sessionStats.wrong,
      bestCombo: sessionStats.bestCombo || 0,
      elapsedSec,
      appVersion: _appVersion,
    };

    dbAddSession(sessionRow)
      .then(() => Promise.all([dbGetAllSessions(), dbGetAll()]))
      .then(([sessions, rows]) => {
        const fn = csvFileName || '';
        // 正解/誤答/未出題はanswer履歴から
        const filtered = fn ? rows.filter(r => r.csvFileName === fn) : rows;
        const history = buildHistory(filtered);
        let unseen = 0, lastCorrect = 0, lastWrong = 0, totalUniq = 0;
        const seenEntries = new Set();
        for (const d of vocabData) {
          const k = histKey(d.word, d.correct);
          if (seenEntries.has(k)) continue;
          seenEntries.add(k);
          totalUniq++;
          const h = history.get(k);
          if (!h) { unseen++; continue; }
          if (h.lastPass === '○') lastCorrect++; else lastWrong++;
        }
        // 日別集計（各単語・各日の最終回答ベース）
        const wordDayMap = new Map(); // "wordKey|date" → {date, lastTime, lastPass}
        for (const row of filtered) {
          const wk = histKey(row.word, row.correct);
          if (!seenEntries.has(wk) || !row.date) continue;
          const dk = wk + '|' + row.date;
          const t = row.date + (row.time || '');
          const cur = wordDayMap.get(dk);
          if (!cur || t > cur.lastTime) wordDayMap.set(dk, { date: row.date, lastTime: t, lastPass: row.pass });
        }
        const dayMap = new Map();
        for (const { date, lastPass } of wordDayMap.values()) {
          if (!dayMap.has(date)) dayMap.set(date, { date, correct: 0, wrong: 0 });
          const e = dayMap.get(date);
          if (lastPass === '○') e.correct++; else e.wrong++;
        }
        // 日別平均解答時間
        const dayElapsedMap = new Map();
        for (const row of filtered) {
          if (!row.date || !row.elapsed) continue;
          const e = dayElapsedMap.get(row.date) || { total: 0, count: 0 };
          e.total += parseFloat(row.elapsed) || 0;
          e.count++;
          dayElapsedMap.set(row.date, e);
        }
        const dailyStats = [...dayMap.values()].sort((a, b) => b.date.localeCompare(a.date)).map(d => ({
          ...d,
          avgElapsed: dayElapsedMap.has(d.date) ? parseFloat((dayElapsedMap.get(d.date).total / dayElapsedMap.get(d.date).count).toFixed(1)) : null,
        }));
        const totalElapsedSec = (fn ? sessions.filter(s => s.csvFileName === fn) : sessions)
          .reduce((acc, s) => acc + (s.elapsedSec || 0), 0);
        setGlobalStats({ total: totalUniq, unseen, lastCorrect, lastWrong, totalElapsedSec, dailyStats });
      }).catch(() => {});
  }, [vocabData, csvFileName, sessionStats]);

  if (!sessionStats) return null;
  const { total, correct, wrong, bestCombo = 0, avgElapsedSec = 0 } = sessionStats;
  const displayName = vocabName || (csvFileName || '').replace(/\.csv$/i, '') || '単語帳';
  const accPct = total > 0 ? Math.round((correct / total) * 100) : 0;
  const dispElapsed = sessionElapsedSec ?? (sessionStats.elapsedSec || 0);
  const elapsedMin = Math.floor(dispElapsed / 60);
  const elapsedS   = String(dispElapsed % 60).padStart(2, '0');
  const { emoji, label } =
    accPct === 100 ? { emoji:'🏆', label:'完璧！' } :
    accPct >= 80   ? { emoji:'🎉', label:'ナイス！' } :
    accPct >= 60   ? { emoji:'💪', label:'がんばった！' } :
                     { emoji:'🌟', label:'おつかれさま！' };
  const missed = missedWords || [];
  return (
    <div className={`vocab-app variant-${variant.id}`}>
      <div className="result-screen">
        <div className="result-heading-wrap">
          <span className="result-emoji">{emoji}</span>
          <span className="result-heading">{label}</span>
        </div>
        <div className="result-stats-card">
          <div style={{display:'flex', justifyContent:'center', alignItems:'baseline', gap:24}}>
            <div style={{textAlign:'center'}}>
              <div className="result-acc-pct">{accPct}<span className="result-acc-unit">%</span></div>
              <div className="result-acc-label">ACCURACY</div>
            </div>
            {avgElapsedSec > 0 && (
              <div style={{textAlign:'center'}}>
                <div className="result-acc-pct" style={{fontSize:40}}>{avgElapsedSec.toFixed(1)}<span className="result-acc-unit">秒</span></div>
                <div className="result-acc-label">平均解答時間/問</div>
              </div>
            )}
          </div>
          <div className="result-grid">
            <div className="result-stat ok">
              <div className="result-stat-label">正解</div>
              <div className="result-stat-num">{correct}</div>
            </div>
            <div className="result-stat ng">
              <div className="result-stat-label">不正解</div>
              <div className="result-stat-num">{wrong}</div>
            </div>
            <div className="result-stat">
              <div className="result-stat-label">ベストコンボ</div>
              <div className="result-stat-num">{bestCombo}</div>
            </div>
            <div className="result-stat">
              <div className="result-stat-label">学習時間</div>
              <div className="result-stat-num" style={{fontSize:'18px'}}>{elapsedMin}分{elapsedS}秒</div>
            </div>
          </div>
        </div>
        <div className="result-vocab-card">
          <div className="result-vocab-name">{displayName}</div>
          {globalStats ? (
            <>
              <div style={{width:'100%', background:'#FFFBE6', border:'1.5px solid rgba(0,0,0,0.08)', borderRadius:12, padding:'10px 12px', marginBottom:10}}>
                <div style={{fontSize:10, fontWeight:800, letterSpacing:'0.1em', color:'#aaa', textTransform:'uppercase', marginBottom:8}}>累計</div>
                <div className="result-vocab-rows">
                  <div className="result-vocab-row">
                    <span className="result-vocab-row-label">出題済み / 総収録問数</span>
                    <span style={{display:'flex', gap:4, alignItems:'center'}}>
                      <span className="result-vocab-row-val">{globalStats.total - globalStats.unseen}</span>
                      <span style={{color:'#bbb', fontWeight:700}}>/</span>
                      <span className="result-vocab-row-val">{globalStats.total}</span>
                    </span>
                  </div>
                  <div className="result-vocab-row">
                    <span className="result-vocab-row-label">正解率 / 正解 / 誤答</span>
                    <span style={{display:'flex', gap:6, alignItems:'center'}}>
                      <span className="result-vocab-row-val">{globalStats.lastCorrect + globalStats.lastWrong > 0 ? Math.round(globalStats.lastCorrect / (globalStats.lastCorrect + globalStats.lastWrong) * 100) : 0}%</span>
                      <span style={{color:'#bbb', fontWeight:700}}>/</span>
                      <span className="result-vocab-row-val ok">{globalStats.lastCorrect}</span>
                      <span style={{color:'#bbb', fontWeight:700}}>/</span>
                      <span className="result-vocab-row-val ng">{globalStats.lastWrong}</span>
                    </span>
                  </div>
                  {avgElapsedSec > 0 && (
                    <div className="result-vocab-row">
                      <span className="result-vocab-row-label">平均解答時間/問</span>
                      <span className="result-vocab-row-val">{avgElapsedSec.toFixed(1)}秒</span>
                    </div>
                  )}
                  <div className="result-vocab-row">
                    <span className="result-vocab-row-label">総学習時間</span>
                    <span className="result-vocab-row-val" style={{fontSize:'15px'}}>
                      {(() => {
                        const sec = globalStats.totalElapsedSec || 0;
                        const h = Math.floor(sec / 3600);
                        const m = Math.floor((sec % 3600) / 60);
                        const s = String(sec % 60).padStart(2, '0');
                        return h > 0 ? `${h}時間${m}分${s}秒` : `${m}分${s}秒`;
                      })()}
                    </span>
                  </div>
                </div>
                <div className="result-vocab-bar" style={{marginTop:10}}>
                  <div className="result-vocab-bar-seg ok" style={{width:`${(globalStats.lastCorrect/globalStats.total)*100}%`}}/>
                  <div className="result-vocab-bar-seg ng" style={{width:`${(globalStats.lastWrong/globalStats.total)*100}%`}}/>
                  <div className="result-vocab-bar-seg un" style={{width:`${(globalStats.unseen/globalStats.total)*100}%`}}/>
                </div>
              </div>
              {globalStats.dailyStats && globalStats.dailyStats.length > 0 && (
                <div style={{marginTop:12, borderTop:'1.5px solid #eee', paddingTop:10, display:'flex', flexDirection:'column', gap:5}}>
                  {globalStats.dailyStats.map(d => {
                    const tot = d.correct + d.wrong;
                    const pct = tot > 0 ? Math.round(d.correct / tot * 100) : 0;
                    const raw = d.date || '';
                    const label = raw.length === 8 ? `${raw.slice(4,6)}/${raw.slice(6,8)}` : raw;
                    return (
                      <div key={d.date} style={{display:'flex', justifyContent:'space-between', alignItems:'center', fontFamily:"'M PLUS Rounded 1c',sans-serif"}}>
                        <span style={{fontSize:12, fontWeight:700, color:'#888'}}>{label}</span>
                        <span style={{display:'flex', gap:6, alignItems:'center'}}>
                          <span style={{fontSize:13, fontWeight:900, color:'#111'}}>{pct}%</span>
                          <span style={{color:'#bbb', fontWeight:700, fontSize:12}}>/</span>
                          <span style={{fontSize:13, fontWeight:900, color:'#2BC48A'}}>{d.correct}</span>
                          <span style={{color:'#bbb', fontWeight:700, fontSize:12}}>/</span>
                          <span style={{fontSize:13, fontWeight:900, color:'#FF5B8A'}}>{d.wrong}</span>
                          {d.avgElapsed != null && (
                            <>
                              <span style={{color:'#bbb', fontWeight:700, fontSize:12}}>|</span>
                              <span style={{fontSize:12, fontWeight:800, color:'#888'}}>{Number(d.avgElapsed).toFixed(1)}秒/問</span>
                            </>
                          )}

                    );

              )}

          ) : (

          )}
        </div>
        <div className="result-footer">
          <button className="end-btn" onClick={onRetry}>もう一度</button>
          <button className="end-btn end-btn-dl" onClick={onRestart}>タイトルに戻る</button>
        </div>
      </div>
    </div>
  );
}

function ParticleCanvas({ getNode }) {
  const ref = React.useRef(null);
  const partsRef = React.useRef([]);
  const rafRef = React.useRef(0);

  React.useEffect(() => {
    const canvas = ref.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');

    const resize = () => {
      const rect = canvas.parentElement.getBoundingClientRect();
      canvas.width = rect.width * 2;
      canvas.height = rect.height * 2;
      canvas.style.width = rect.width + 'px';
      canvas.style.height = rect.height + 'px';
      ctx.scale(2, 2);
    };
    resize();

    let ro = null;
    if (typeof ResizeObserver !== 'undefined') {
      ro = new ResizeObserver(resize);
      ro.observe(canvas.parentElement);
    }

    const drawStar = (ctx, p) => {
      ctx.fillStyle = p.color;
      ctx.shadowColor = p.color;
      ctx.shadowBlur = 8;
      ctx.beginPath();
      for (let k = 0; k < 5; k++) {
        const ang = (k / 5) * Math.PI * 2 - Math.PI / 2;
        const sx = Math.cos(ang) * p.size;
        const sy = Math.sin(ang) * p.size;
        if (k === 0) ctx.moveTo(sx, sy); else ctx.lineTo(sx, sy);
        const a2 = ang + Math.PI / 5;
        ctx.lineTo(Math.cos(a2) * p.size * 0.45, Math.sin(a2) * p.size * 0.45);
      }
      ctx.closePath();
      ctx.fill();
    };

    const tick = () => {
      const w = canvas.width / 2;
      const h = canvas.height / 2;
      ctx.clearRect(0, 0, w, h);
      const parts = partsRef.current;
      for (let i = parts.length - 1; i >= 0; i--) {
        const p = parts[i];
        p.life -= 1;
        p.vy += p.gravity;
        p.x += p.vx;
        p.y += p.vy;
        p.vx *= p.drag;
        p.vy *= p.drag;
        p.rot += p.vrot;
        if (p.life <= 0 || p.y > h + 20) { parts.splice(i, 1); continue; }
        const alpha = Math.max(0, Math.min(1, p.life / p.maxLife));
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot);
        ctx.globalAlpha = alpha;
        if (p.type === 'confetti') {
          ctx.fillStyle = p.color;
          ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size * 0.5);
        } else if (p.type === 'star') {
          drawStar(ctx, p);
        } else if (p.type === 'spark') {
          ctx.strokeStyle = p.color;
          ctx.shadowColor = p.color;
          ctx.shadowBlur = 6;
          ctx.lineWidth = p.size;
          ctx.lineCap = 'round';
          ctx.beginPath();
          ctx.moveTo(0, 0);
          ctx.lineTo(-p.vx * 2, -p.vy * 2);
          ctx.stroke();
        } else if (p.type === 'ring') {
          ctx.strokeStyle = p.color;
          ctx.lineWidth = 2;
          ctx.shadowColor = p.color;
          ctx.shadowBlur = 8;
          ctx.beginPath();
          ctx.arc(0, 0, p.size, 0, Math.PI * 2);
          ctx.stroke();
          p.size += 2;
        }
        ctx.restore();
      }
      rafRef.current = requestAnimationFrame(tick);
    };
    rafRef.current = requestAnimationFrame(tick);

    const pushParticle = (obj) => partsRef.current.push(obj);
    const rnd = Math.random;
    const CONFETTI_COLORS = ['#FFE680','#FF7A4E','#FF3C8C','#7C5CFF','#5BE3A8','#3EC1FF'];
    const STAR_COLORS = ['#FFE680','#FFFFFF','#FFB347'];
    const SPARK_COLORS = ['#FF3C6A','#FF7AA0'];

    getNode({
      burstConfetti: function(x, y, opts) {
        if (!opts) opts = {};
        const colors = opts.colors || CONFETTI_COLORS;
        const n = opts.count || 28;
        for (let i = 0; i < n; i++) {
          const ang = -Math.PI / 2 + (rnd() - 0.5) * Math.PI * 0.9;
          const spd = 4 + rnd() * 7;
          pushParticle({ x, y, vx: Math.cos(ang)*spd, vy: Math.sin(ang)*spd, gravity: 0.18, drag: 0.99, rot: rnd()*Math.PI*2, vrot: (rnd()-0.5)*0.4, size: 5+rnd()*5, color: colors[(rnd()*colors.length)|0], life: 60+rnd()*30, maxLife: 90, type: 'confetti' });
        }
      },
      burstStars: function(x, y, opts) {
        if (!opts) opts = {};
        const colors = opts.colors || STAR_COLORS;
        const n = opts.count || 12;
        for (let i = 0; i < n; i++) {
          const ang = (i / n) * Math.PI * 2;
          const spd = 3 + rnd() * 4;
          pushParticle({ x, y, vx: Math.cos(ang)*spd, vy: Math.sin(ang)*spd, gravity: 0.06, drag: 0.96, rot: 0, vrot: (rnd()-0.5)*0.3, size: 4+rnd()*4, color: colors[(rnd()*colors.length)|0], life: 50, maxLife: 50, type: 'star' });
        }
        pushParticle({ x, y, vx: 0, vy: 0, gravity: 0, drag: 1, rot: 0, vrot: 0, size: 10, color: '#FFFFFF', life: 24, maxLife: 24, type: 'ring' });
      },
      burstSparks: function(x, y, opts) {
        if (!opts) opts = {};
        const colors = opts.colors || SPARK_COLORS;
        const n = opts.count || 10;
        for (let i = 0; i < n; i++) {
          const ang = rnd() * Math.PI * 2;
          const spd = 3 + rnd() * 5;
          pushParticle({ x, y, vx: Math.cos(ang)*spd, vy: Math.sin(ang)*spd, gravity: 0.05, drag: 0.94, rot: ang, vrot: 0, size: 2+rnd()*1.5, color: colors[(rnd()*colors.length)|0], life: 22, maxLife: 22, type: 'spark' });
        }
      },
    });

    return () => {
      cancelAnimationFrame(rafRef.current);
      if (ro) ro.disconnect();
    };
  }, []);

  return <canvas ref={ref} className="particles"/>;
}

function VocabApp({ variant, config = {} }) {
  const { timer=true, totalQuestions=12, vocabData=VOCAB_DATA, csvFileName='(組み込み)', onResult, onSessionEnd } = config;
  const [difficulty, setDifficulty] = React.useState('normal');
  const [questions, setQuestions] = React.useState(() => buildQuestions(vocabData, totalQuestions));
  const [idx, setIdx] = React.useState(0);
  const [correct, setCorrect] = React.useState(0);
  const [wrong, setWrong] = React.useState(0);
  const [combo, setCombo] = React.useState(0);
  const [bestCombo, setBestCombo] = React.useState(0);
  const [retry, setRetry] = React.useState(null);
  const [ended, setEnded] = React.useState(false);
  const [soundOn, setSoundOnState] = React.useState(_soundOn);
  const toggleSound = () => { const v = !soundOn; setSoundOn(v); setSoundOnState(v); };
  const [answerHistory, setAnswerHistory] = React.useState([]);
  const answerHistoryRef = React.useRef([]);
  const [dockFlash, setDockFlash] = React.useState('');
  const [shake, setShake] = React.useState(false);
  const [edgeFlash, setEdgeFlash] = React.useState('');
  const particlesRef = React.useRef(null);
  const containerRef = React.useRef(null);
  const [judge, setJudge] = React.useState(null);
  const judgeKeyRef = React.useRef(0);
  const answerStartRef = React.useRef(Date.now());
  const sessionStartRef = React.useRef(Date.now()); // セッション開始時刻
  const wrongQsRef = React.useRef([]);      // 誤答した問題を蓄積
  const correctCntRef = React.useRef(0);   // 正解数（ended時に正確な値を取得するため）
  const wrongCntRef = React.useRef(0);
  const skipCntRef = React.useRef(0);      // タイムアウト数
  const bestComboRef = React.useRef(0);    // ベストコンボ
  const historyRef = React.useRef(new Map());   // DB履歴スナップショット（単語別）
  const wordStatsRef = React.useRef(new Map()); // 今セッションの単語別 {correct, wrong}

  const timerMaxByDiff = { easy:0, normal:10, hard:6 };
  const timerMax = timer ? timerMaxByDiff[difficulty] : 0;
  const [timeLeft, setTimeLeft] = React.useState(timerMax);

  const q = questions[idx];

  // 現在・次の問題の画像をプリロード（リトライカード表示時の遅延を防ぐ）
  React.useEffect(() => {
    [questions[idx], questions[idx + 1]].forEach(question => {
      if (question?.imageFile && csvFileName) {
        const img = new Image();
        img.src = 'images/' + csvFileName.replace(/\.csv$/i, '') + '/' + question.imageFile;
      }
    });
  }, [idx, questions, csvFileName]);

  // On mount: load DB history and rebuild questions with weighting
  React.useEffect(() => {
    dbGetAll()
      .then(rows => {
        const h = buildHistory(rows);
        historyRef.current = h;
        return buildWeightedQuestions(vocabData, totalQuestions, h);
      })
      .then(qs => setQuestions(qs))
      .catch(() => {});
  }, []); // eslint-disable-line react-hooks/exhaustive-deps

  // When session ends: notify parent with wrongs list
  React.useEffect(() => {
    if (!ended) return;
    const hist = answerHistoryRef.current;
    const avgElapsedSec = hist.length > 0
      ? parseFloat((hist.reduce((s, h) => s + h.sec, 0) / hist.length).toFixed(1))
      : 0;
    onSessionEnd?.({
      wrongs: wrongQsRef.current,
      total: questions.length,
      correct: correctCntRef.current,
      wrong: wrongCntRef.current,
      skip: skipCntRef.current,
      bestCombo: bestComboRef.current,
      elapsedSec: Math.round((Date.now() - sessionStartRef.current) / 1000),
      sessionStartMs: sessionStartRef.current,
      avgElapsedSec,
    });
  }, [ended]); // eslint-disable-line react-hooks/exhaustive-deps

  React.useEffect(() => {
    setTimeLeft(timerMax);
    answerStartRef.current = Date.now();
  }, [idx, timerMax]);

  React.useEffect(() => {
    if (!timerMax || retry || ended) return;
    if (timeLeft <= 0) { handleAnswer(null, null); return; }
    const t = setTimeout(() => setTimeLeft(tl => Math.max(0, tl-1)), 1000);
    return () => clearTimeout(t);
  }, [timeLeft, timerMax, retry, ended]);

  const restart = React.useCallback(() => {
    wrongQsRef.current = []; correctCntRef.current = 0; wrongCntRef.current = 0; skipCntRef.current = 0; bestComboRef.current = 0; sessionStartRef.current = Date.now();
    wordStatsRef.current = new Map();
    dbGetAll()
      .then(rows => {
        const h = buildHistory(rows);
        historyRef.current = h;
        return buildWeightedQuestions(vocabData, totalQuestions, h);
      })
      .catch(() => { historyRef.current = new Map(); return buildQuestions(vocabData, totalQuestions); })
      .then(qs => {
        setQuestions(qs);
        setIdx(0); setCorrect(0); setWrong(0); setCombo(0); setBestCombo(0);
        setRetry(null); setEnded(false);
        answerHistoryRef.current = []; setAnswerHistory([]); setDockFlash('');
        setTimeLeft(timerMaxByDiff[difficulty]);
      });
  }, [difficulty, totalQuestions, vocabData]);

  const handleAnswer = React.useCallback((answer, dir) => {
    if (!q || retry) return;
    const elapsed = parseFloat(((Date.now() - answerStartRef.current) / 1000).toFixed(1));
    const isCorrect = answer === q.correct;
    const rightDir = ['up','right','down','left'][q.choices.indexOf(q.correct)];
    const ts = new Date();
    const row = {
      date: fmtDate(ts), time: fmtTime(ts), csvFileName,
      word: q.word, correct: q.correct,
      userAnswer: answer ?? '(タイムアウト)',
      pass: isCorrect ? '○' : '×', elapsed,
    };
    dbAdd(row).catch(() => {});
    onResult?.(row);
    // 単語別セッション内カウントを更新
    const wk = histKey(q.word, q.correct);
    const ws = wordStatsRef.current.get(wk) || { correct: 0, wrong: 0 };
    if (isCorrect) ws.correct++; else ws.wrong++;
    wordStatsRef.current.set(wk, ws);
    if (isCorrect) {
      correctCntRef.current++;
      setCorrect(c => c+1);
      const nc = combo + 1; setCombo(nc); setBestCombo(b => { const nb = Math.max(b, nc); bestComboRef.current = nb; return nb; });
      answerHistoryRef.current = [...answerHistoryRef.current, { ok: true, sec: elapsed }];
      setAnswerHistory(answerHistoryRef.current);
      setDockFlash('ok'); setTimeout(() => setDockFlash(''), 400);
      setEdgeFlash('ok'); setTimeout(() => setEdgeFlash(''), 500);
      judgeKeyRef.current++;
      const judgeKind = nc >= 10 ? 'unstoppable' : nc >= 5 ? 'fire' : nc >= 3 ? 'nice' : 'good';
      const judgeLabel = nc >= 10 ? 'UNSTOPPABLE' : nc >= 5 ? 'FIRE' : nc >= 3 ? 'NICE' : 'GOOD';
      setJudge({ kind: judgeKind, label: judgeLabel, key: judgeKeyRef.current });
      setTimeout(() => setJudge(null), 950);
      if (particlesRef.current && containerRef.current) {
        const { clientWidth: w, clientHeight: h } = containerRef.current;
        const cx = w/2, cy = h*0.55;
        if (nc >= 10) {
          particlesRef.current.burstStars(cx, cy, { count: 42 });
          particlesRef.current.burstConfetti(cx, cy, { count: 90, colors: ['#7FE9FF','#FF3C8C','#7C5CFF','#fff'] });
        } else if (nc >= 5) {
          particlesRef.current.burstConfetti(cx, cy, { count: 66, colors: ['#FFD66B','#FF5B8A','#fff'] });
        } else if (nc >= 3) {
          particlesRef.current.burstConfetti(cx, cy, { count: 48, colors: ['#FFF0A0','#FFD066','#FFB547','#fff'] });
        } else {
          particlesRef.current.burstConfetti(cx, cy, { count: 48, colors: ['#5BE3A8','#2BC48A','#fff'] });
        }
      }
      if (idx+1 >= questions.length) setEnded(true); else setIdx(i => i+1);
    } else {
      wrongCntRef.current++;
      if (answer === null) skipCntRef.current++; // タイムアウト
      if (!wrongQsRef.current.some(w => w.word === q.word)) wrongQsRef.current.push(q);
      setWrong(w => w+1); setCombo(0);
      answerHistoryRef.current = [...answerHistoryRef.current, { ok: false, sec: elapsed }];
      setAnswerHistory(answerHistoryRef.current);
      setDockFlash('ng'); setTimeout(() => setDockFlash(''), 400);
      setShake(true); setTimeout(() => setShake(false), 420);
      setEdgeFlash('ng'); setTimeout(() => setEdgeFlash(''), 500);
      judgeKeyRef.current++;
      setJudge({ kind: 'miss', label: 'MISS!', key: judgeKeyRef.current });
      setTimeout(() => setJudge(null), 950);
      if (particlesRef.current && containerRef.current) {
        const { clientWidth: w, clientHeight: h } = containerRef.current;
        particlesRef.current.burstSparks(w/2, h*0.55);
      }
      answerStartRef.current = Date.now();
      setRetry({ rightDir });
    }
  }, [q, retry, combo, idx, questions.length, csvFileName, onResult]);

  const handleRetrySwipe = React.useCallback((answer, dir) => {
    if (!retry) return;
    if (dir !== retry.rightDir) return;
    setTimeLeft(timerMax); // タイムアウト後のリトライ時に timeLeft=0 のまま次問に進むとタイマーが即発火するのを防ぐ
    setRetry(null);
    if (idx+1 >= questions.length) setEnded(true); else setIdx(i => i+1);
  }, [retry, idx, questions.length, timerMax]);

  if (!q && !ended) return null;
  const total = questions.length;
  const answered = correct + wrong;
  const accPct = answered > 0 ? Math.round((correct/answered)*100) : 0;
  const totalSec = answerHistory.reduce((s, h) => s + h.sec, 0);
  const avgSec = answered > 0 ? totalSec / answered : 0;
  const accClass = answered > 0 ? (accPct >= 80 ? 'good' : accPct >= 50 ? 'mid' : 'bad') : '';
  const speedClass = avgSec === 0 ? '' : avgSec <= 3 ? 'good' : avgSec <= 6 ? 'mid' : 'bad';
  const accColor = accClass === 'good' ? '#2BC48A' : accClass === 'mid' ? '#C87D00' : accClass === 'bad' ? '#FF5B8A' : '#7C5CFF';
  const speedColor = speedClass === 'good' ? '#2BC48A' : speedClass === 'mid' ? '#C87D00' : speedClass === 'bad' ? '#FF5B8A' : '#7C5CFF';
  const speedEmoji = avgSec === 0 ? '⏱' : avgSec <= 2 ? '⚡' : avgSec <= 4 ? '🚀' : avgSec <= 6 ? '🎯' : '🐢';
  const accTierLabel = answered === 0 ? '— READY' : accPct === 100 ? '👑 PERFECT' : accPct >= 80 ? '🎯 SHARP' : accPct >= 50 ? '✦ GOOD' : '↑ KEEP GOING';
  const speedTierLabel = avgSec === 0 ? '— READY' : avgSec <= 2 ? '⚡ LIGHTNING' : avgSec <= 4 ? '🚀 FAST' : avgSec <= 6 ? '🎯 STEADY' : '🐢 RELAX';

  return (
    <div ref={containerRef} className={`vocab-app variant-${variant.id}${shake ? ' shake' : ''}`}>
      <div className={'edge-flash' + (edgeFlash ? ' ' + edgeFlash : '')}/>
      <ParticleCanvas getNode={(api) => { particlesRef.current = api; }}/>
      <StatsBar total={total} current={idx} correct={correct} wrong={wrong} combo={combo} bestCombo={bestCombo} timeLeft={timeLeft} timerMax={timerMax} variant={variant} soundOn={soundOn} onToggleSound={toggleSound}/>
      {!ended && (
        <div className="mini-stats">
          <div className={`ms${accClass ? ' tier-' + accClass : ''}${edgeFlash === 'ok' ? ' flash-ok' : edgeFlash === 'ng' ? ' flash-ng' : ''}`}>
            <AccuracyRing pct={accPct} color={accColor}/>
            <div className="ms-text">
              <div className="ms-label"><span className="ms-jp">正答率</span><span>ACC</span></div>
              <div className="ms-big">
                <span className={`ms-num ${accClass}${edgeFlash ? ' bump' : ''}`} key={'acc-' + answered}>{accPct}</span>
                <span className="ms-unit">%</span>
              </div>
              <span className={`ms-tier ${accClass || 'good'}`}>{accTierLabel}</span>
            </div>
          </div>
          <div className={`ms${speedClass ? ' tier-' + speedClass : ' tier-good'}${edgeFlash === 'ok' ? ' flash-ok' : edgeFlash === 'ng' ? ' flash-ng' : ''}`}>
            <SpeedGauge sec={avgSec} color={speedColor} emoji={speedEmoji}/>
            <div className="ms-text">
              <div className="ms-label"><span className="ms-jp">解答時間</span><span>AVG</span></div>
              <div className="ms-big">
                <span className={`ms-num ${speedClass}${edgeFlash ? ' bump' : ''}`} key={'spd-' + answered}>{avgSec > 0 ? avgSec.toFixed(1) : '0.0'}</span>
                <span className="ms-unit">秒/問</span>
              </div>
              <span className={`ms-tier ${speedClass || 'good'}`}>{speedTierLabel}</span>
            </div>
          </div>
        </div>
      )}
      {!ended && <ComboTimer combo={combo} bestCombo={bestCombo} timeLeft={timeLeft} timerMax={timerMax} variant={variant}/>}
      {judge && <div className="judge-layer"><div key={judge.key} className={'judge ' + judge.kind}>{judge.label}</div></div>}
      {!ended && !retry && <SwipeCard key={idx} question={q} onAnswer={handleAnswer} variant={variant} disabled={false} feedback={null} onPlaySound={() => playComboSound(combo + 1)} onPlayWrong={playBooSound} nextQuestion={questions[idx + 1]} remaining={questions.length - idx - 1}/>}
      {!ended && retry && (() => {
        const h = historyRef.current.get(histKey(q?.word, q?.correct));
        const ws = wordStatsRef.current.get(histKey(q?.word, q?.correct)) || { correct: 0, wrong: 0 };
        const retryScore = { correct: (h?.correctCount ?? 0) + ws.correct, wrong: (h?.wrongCount ?? 0) + ws.wrong };
        return <SwipeCard key={`r${idx}`} question={q} onAnswer={handleRetrySwipe} variant={variant} disabled={false} feedback={null} retryMode rightDir={retry.rightDir} onPlaySound={playOkSound} retryScore={retryScore} nextQuestion={questions[idx + 1]} remaining={questions.length - idx - 1} csvFileName={csvFileName}/>;
      })()}
      {combo >= 1 && <ComboBurst combo={combo} active={!!(judge && judge.kind === 'ok')}/>}
      {ended && !onSessionEnd && (
        <div className="end-screen">
          <h1>Done!</h1>
          <div className="end-stats">
            <div className="end-stat"><span className="end-stat-num">{correct}/{total}</span><span className="end-stat-label">Correct</span></div>
            <div className="end-stat"><span className="end-stat-num">{accPct}%</span><span className="end-stat-label">Accuracy</span></div>
            <div className="end-stat"><span className="end-stat-num">{bestCombo}</span><span className="end-stat-label">Best Combo</span></div>
          </div>
          <div style={{display:'flex', gap:10, flexWrap:'wrap', justifyContent:'center'}}>
            <button className="end-btn" onClick={restart}>もう一度</button>
            {onResult && <button className="end-btn end-btn-dl" onClick={() => onResult('__download__')}>結果を保存</button>}
          </div>
        </div>
      )}
    </div>
  );
}

// ── CSV parser ──
function parseCSV(text) {
  const lines = text.split(/\r?\n/).filter(l => l.trim());
  const start = /^word[,\t]/i.test(lines[0]) ? 1 : 0;
  const raw = [];
  const errors = [];

  // 1st pass: collect all rows (word + correct minimum)
  lines.slice(start).forEach((line, i) => {
    const cols = line.split(',').map(c => c.replace(/^﻿/, '').trim());
    const word = cols[0], correct = cols[1];
    const wrongs = [cols[2], cols[3], cols[4]].filter(Boolean);
    const imageFile = cols[5] || '';
    if (!word || !correct) { errors.push(`行${start+i+1}: wordまたはcorrectが空です`); return; }
    raw.push({ word, correct, wrongs, imageFile });
  });

  if (raw.length === 0) return { data: [], errors };

  // Store raw wrongs (no auto-fill here; buildChoices handles it with DB history)
  const data = raw.map(r => ({ word: r.word, correct: r.correct, wrongs: r.wrongs, imageFile: r.imageFile || '' }));

  return { data, errors };
}

// ── IndexedDB helpers ──
const DB_NAME = 'swipewords-db', DB_VER = 2, STORE = 'results', SESSIONS_STORE = 'sessions';

// アプリバージョン（sw.js から非同期取得）
let _appVersion = '';
fetch('sw.js').then(r => r.text()).then(text => {
  const m = text.match(/CACHE\s*=\s*['"]([^'"]+)['"]/);
  if (m) _appVersion = m[1];
}).catch(() => {});

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = e => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains(STORE))
        db.createObjectStore(STORE, { autoIncrement: true });
      if (!db.objectStoreNames.contains(SESSIONS_STORE))
        db.createObjectStore(SESSIONS_STORE, { autoIncrement: true });
    };
    req.onsuccess = e => resolve(e.target.result);
    req.onerror = e => reject(e.target.error);
  });
}
async function dbAddSession(row) {
  const db = await openDB();
  return new Promise((res, rej) => {
    const tx = db.transaction(SESSIONS_STORE, 'readwrite');
    tx.objectStore(SESSIONS_STORE).add(row);
    tx.oncomplete = res; tx.onerror = e => rej(e.target.error);
  });
}
async function dbGetAllSessions() {
  const db = await openDB();
  return new Promise((res, rej) => {
    const req = db.transaction(SESSIONS_STORE, 'readonly').objectStore(SESSIONS_STORE).getAll();
    req.onsuccess = e => res(e.target.result);
    req.onerror = e => rej(e.target.error);
  });
}
async function dbAdd(row) {
  const db = await openDB();
  return new Promise((res, rej) => {
    const tx = db.transaction(STORE, 'readwrite');
    tx.objectStore(STORE).add(row);
    tx.oncomplete = res; tx.onerror = e => rej(e.target.error);
  });
}
async function dbGetAll() {
  const db = await openDB();
  return new Promise((res, rej) => {
    const req = db.transaction(STORE, 'readonly').objectStore(STORE).getAll();
    req.onsuccess = e => res(e.target.result);
    req.onerror = e => rej(e.target.error);
  });
}
async function dbCount() {
  const db = await openDB();
  return new Promise((res, rej) => {
    const req = db.transaction(STORE, 'readonly').objectStore(STORE).count();
    req.onsuccess = e => res(e.target.result);
    req.onerror = e => rej(e.target.error);
  });
}
async function dbClear() {
  const db = await openDB();
  return new Promise((res, rej) => {
    const tx = db.transaction(STORE, 'readwrite');
    tx.objectStore(STORE).clear();
    tx.oncomplete = res; tx.onerror = e => rej(e.target.error);
  });
}

// ── TitleMode ──
function TitleMode({ vocabData, csvFileName, onStart, onCsvSwitch, variant }) {
  const [csvList, setCsvList] = React.useState([]);
  const [loadingCsv, setLoadingCsv] = React.useState(false);
  const [wordStats, setWordStats] = React.useState(null);
  const [swVersion, setSwVersion] = React.useState('');
  const [previewIdx, setPreviewIdx] = React.useState(0);

  // プレビューカード用サンプル単語
  const previewWords = React.useMemo(() => {
    if (!vocabData || vocabData.length === 0) return ['Swipe','Words'];
    const pool = vocabData.slice(0, Math.min(vocabData.length, 50));
    const picked = [];
    const used = new Set();
    while (picked.length < 6 && picked.length < pool.length) {
      const i = Math.floor(Math.random() * pool.length);
      if (!used.has(i)) { used.add(i); picked.push(pool[i].word || pool[i][Object.keys(pool[i])[0]]); }
    }
    return picked.length > 0 ? picked : ['Swipe','Words'];
  }, [vocabData]);

  React.useEffect(() => {
    const id = setInterval(() => setPreviewIdx(i => (i + 1) % previewWords.length), 1500);
    return () => clearInterval(id);
  }, [previewWords]);

  // sw.js バージョン取得
  React.useEffect(() => {
    fetch('/sw.js').then(r => r.text()).then(text => {
      const m = text.match(/CACHE\s*=\s*['"]([^'"]+)['"]/);
      if (m) setSwVersion(m[1]);
    }).catch(() => {});
  }, []);

  // DB履歴から直近の正解数・誤答数を集計（結果画面と同じ単語帳基準）
  React.useEffect(() => {
    const fn = csvFileName || 'ターゲット１４００（５訂）_精査後.csv';
    dbGetAll().then(rows => {
      const filtered = rows.filter(r => r.csvFileName === fn);
      const hist = buildHistory(filtered);
      let correct = 0, wrong = 0;
      const seenEntries = new Set();
      for (const d of (vocabData || [])) {
        const k = histKey(d.word, d.correct);
        if (seenEntries.has(k)) continue;
        seenEntries.add(k);
        const h = hist.get(k);
        if (!h) continue;
        if (h.lastPass === '○') correct++;
        else if (h.lastPass === '×') wrong++;
      }
      setWordStats({ correct, wrong, total: seenEntries.size });
    }).catch(() => {});
  }, [csvFileName, vocabData]);

  // /words/index.json からCSV一覧取得
  React.useEffect(() => {
    fetch('words/index.json')
      .then(r => r.json())
      .then(list => {
        setCsvList(list.map(name => encodeURIComponent(name)));
      })
      .catch(() => {});
  }, []);

  const cycleCSV = async () => {
    if (csvList.length === 0 || loadingCsv) return;
    const currentName = csvFileName || '';
    const currentIdx = csvList.findIndex(h => decodeURIComponent(h) === currentName || h.includes(encodeURIComponent(currentName)));
    const nextIdx = (currentIdx + 1) % csvList.length;
    setLoadingCsv(true);
    try {
      const href = csvList[nextIdx];
      const res = await fetch('/words/' + href);
      const text = await res.text();
      const { data } = parseCSV(text);
      if (data.length > 0) {
        const name = decodeURIComponent(href.split('/').pop());
        onCsvSwitch(data, name);
      }
    } catch(e) {}
    setLoadingCsv(false);
  };

  const displayName = (csvFileName || 'ターゲット１４００（５訂）_精査後.csv').replace('.csv','');

  const START_OPTIONS = [
    { count:25,  label:'25問' },
    { count:50,  label:'50問' },
    { count:100, label:'100問' },
  ];

  return (
    <div className={`vocab-app variant-${variant?.id||'bubble'}`}>
      {swVersion && <div style={{position:'absolute',top:10,right:14,zIndex:20,fontSize:10,fontWeight:700,opacity:0.25,letterSpacing:'0.05em',pointerEvents:'none'}}>{swVersion}</div>}
      <div className="title-screen">
        <div className="title-badge">スワイプ暗記アプリ</div>
        <h1 className="title-h1">Swipe<span className="title-accent">.</span><br/><span className="title-accent">Study</span></h1>
        <div className="title-tagline">{(wordStats?.total ?? vocabData?.length ?? 0).toLocaleString()}問収録 · スワイプで4択 · コンボを稼げ</div>

        <div className="title-preview-card">
          <span className="title-preview-word" key={previewIdx}>{previewWords[previewIdx] || ''}</span>
        </div>

        <div className="title-start-row">
          {START_OPTIONS.map(({ count, label }) => (
            <button key={count} className="title-start-btn" onClick={() => onStart(count)}>
              <span className="title-start-num">{count}<span className="title-start-q">問</span></span>
              <span className="title-start-label">はじめる</span>
            </button>
          ))}
        </div>

        <div className="title-csv-area">
          <button className="title-csv-btn" onClick={cycleCSV} disabled={loadingCsv}>
            <div className="title-csv-row1">
              <span className="title-csv-icon">📚</span>
              <span className="title-csv-name">{loadingCsv ? '読み込み中...' : displayName}</span>
              {csvList.length > 1 && !loadingCsv && <span className="title-csv-switch">切替 ▶</span>}
            </div>
            <div className="title-csv-stats">
              <span className="title-csv-total">{(wordStats?.total ?? vocabData?.length ?? 0).toLocaleString()}問</span>
              {wordStats && <>
                <span className="title-csv-ok">✓ {wordStats.correct}</span>
                <span className="title-csv-ng">✗ {wordStats.wrong}</span>
              </>}
            </div>
          </button>
        </div>
      </div>
    </div>
  );
}

// ── App ──
function fmtDate(d) {
  return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
}
function fmtTime(d) {
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`;
}

function App() {
  const [view, setView] = React.useState('single');
  const [variantId, setVariantId] = React.useState('pop');
  const [timer, setTimer] = React.useState(true);
  const [numQ, setNumQ] = React.useState(50);
  const [tweaksOpen, setTweaksOpen] = React.useState(false);
  const [vocabData, setVocabData] = React.useState(VOCAB_DATA);
  const [csvFileName, setCsvFileName] = React.useState(null);
  const [csvError, setCsvError] = React.useState(null);
  const [vocabKey, setVocabKey] = React.useState(0);
  const [resultsCount, setResultsCount] = React.useState(0);
  const fileInputRef = React.useRef(null);
  const variant = VARIANTS[variantId] || VARIANTS.bubble;

  // ── モード管理 ──
  const [appMode, setAppMode] = React.useState('title');   // title | playing | memory | confirm | result
  const [sessionStats, setSessionStats] = React.useState(null);
  const [swUpdate, setSwUpdate] = React.useState(false);
  const [swUpToDate, setSwUpToDate] = React.useState(false);

  // SW更新検知
  React.useEffect(() => {
    window.__swUpdateCallback = () => setSwUpdate(true);
    return () => { window.__swUpdateCallback = null; };
  }, []);

  const checkSwUpdate = React.useCallback(async () => {
    try {
      const localRes = await fetch('/sw.js');
      const localText = await localRes.text();
      const localMatch = localText.match(/CACHE\s*=\s*['"]([^'"]+)['"]/);
      const localVersion = localMatch ? localMatch[1] : '';

      const remoteRes = await fetch('/sw.js?t=' + Date.now(), { cache: 'no-store' });
      const remoteText = await remoteRes.text();
      const remoteMatch = remoteText.match(/CACHE\s*=\s*['"]([^'"]+)['"]/);
      const remoteVersion = remoteMatch ? remoteMatch[1] : '';

      if (remoteVersion && localVersion && remoteVersion !== localVersion) {
        setSwUpdate(true);
        setSwUpToDate(false);
        const reg = window.__swReg;
        if (reg) reg.update().catch(() => {});
      } else {
        setSwUpToDate(true);
        setSwUpdate(false);
        setTimeout(() => setSwUpToDate(false), 3000);
      }
    } catch(e) {
      alert("通信に失敗しました");
    }
  }, []);
  const [batches, setBatches] = React.useState([]);   // [[q,...], [q,...], ...]
  const [batchIdx, setBatchIdx] = React.useState(0);

  const currentBatch = batches[batchIdx] || [];
  const totalBatches = batches.length;

  const handleSessionEnd = React.useCallback(({ wrongs, total, correct, wrong, skip = 0, bestCombo = 0, elapsedSec = 0, sessionStartMs = 0, avgElapsedSec = 0 }) => {
    setSessionStats({ total, correct, wrong, skip, bestCombo, elapsedSec, sessionStartMs, avgElapsedSec });
    if (wrongs.length === 0) {
      setAppMode('result');
    } else {
      const BATCH = 10;
      const nb = [];
      for (let i = 0; i < wrongs.length; i += BATCH) nb.push(wrongs.slice(i, i + BATCH));
      setBatches(nb);
      setBatchIdx(0);
      setAppMode('memory');
    }
  }, []);

  const handleMemoryDone = React.useCallback(() => setAppMode('confirm'), []);

  // masteredWord: 誤答直前に正解していた語 → 現グループから除外し次グループ先頭へ
  const handleConfirmFail = React.useCallback((masteredWord) => {
    if (masteredWord) {
      setBatches(prev => {
        const next = prev.map(b => [...b]);
        next[batchIdx] = next[batchIdx].filter(w => w.word !== masteredWord.word);
        if (batchIdx + 1 < next.length) {
          next[batchIdx + 1] = [...next[batchIdx + 1], masteredWord];
        } else {
          next.push([masteredWord]);
        }
        return next;
      });
    }
    setAppMode('memory');
  }, [batchIdx]);

  const handleConfirmPass = React.useCallback(() => {
    const nextIdx = batchIdx + 1;
    if (nextIdx < batches.length) {
      setBatchIdx(nextIdx);
      setAppMode('memory');
    } else {
      setAppMode('result');
    }
  }, [batchIdx, batches.length]);

  const handleRestart = React.useCallback(() => {
    setAppMode('title');
    setBatches([]);
    setBatchIdx(0);
    setSessionStats(null);
  }, []);

  const handleRetry = React.useCallback(() => {
    setBatches([]);
    setBatchIdx(0);
    setSessionStats(null);
    setAppMode('playing');
    setVocabKey(k => k + 1);
  }, []);

  const handleTitleStart = React.useCallback((count) => {
    setNumQ(count);
    setBatches([]);
    setBatchIdx(0);
    setSessionStats(null);
    setAppMode('playing');
    setVocabKey(k => k + 1);
  }, []);

  const handleCsvSwitch = React.useCallback((data, name) => {
    setVocabData(data);
    setCsvFileName(name);
    setCsvError(null);
  }, []);

  // 起動時に保存済み件数を取得
  React.useEffect(() => {
    dbCount().then(setResultsCount).catch(() => {});
  }, []);

  const handleResult = React.useCallback((result) => {
    if (result === '__download__') { window.__swExport?.(); return; }
    setResultsCount(c => c + 1);
  }, []);

  const exportCSV = React.useCallback(async () => {
    const rows = await dbGetAll();
    if (rows.length === 0) { alert('記録がありません'); return; }
    const header = '日付,時刻,問題CSV,単語,正答,ユーザの解答,成否,回答時間(秒)';
    const lines = rows.map(r =>
      [r.date, r.time, r.csvFileName, r.word, r.correct, r.userAnswer, r.pass, r.elapsed].join(',')
    );
    const csv = '\uFEFF' + [header, ...lines].join('\r\n');
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
    const file = new File([blob], `swipewords_${fmtDate(new Date())}.csv`, { type: 'text/csv' });
    if (navigator.canShare?.({ files: [file] })) {
      await navigator.share({ files: [file], title: 'SwipeStudy 結果' });
    } else {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = file.name; a.click();
      URL.revokeObjectURL(url);
    }
  }, []);

  const clearResults = React.useCallback(async () => {
    if (!confirm(`保存済み ${resultsCount} 件を削除しますか？`)) return;
    await dbClear();
    setResultsCount(0);
  }, [resultsCount]);

  React.useEffect(() => { window.__swExport = exportCSV; }, [exportCSV]);

  const handleFileChange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const { data, errors } = parseCSV(ev.target.result);
      if (data.length === 0) { setCsvError(errors[0] || 'データが読み込めませんでした'); return; }
      setCsvError(errors.length > 0 ? `${errors.length}行スキップ` : null);
      setCsvFileName(file.name);
      setVocabData(data);
      setVocabKey(k => k + 1);
    };
    reader.readAsText(file, 'UTF-8');
    e.target.value = '';
  };

  const handleDrop = (e) => {
    e.preventDefault();
    const file = e.dataTransfer.files[0];
    if (file) handleFileChange({ target: { files: [file], value: '' } });
  };

  const resetCSV = () => { setVocabData(VOCAB_DATA); setCsvFileName(null); setCsvError(null); setVocabKey(k => k+1); };

  const resolvedCsvFileName = csvFileName || 'ターゲット１４００（５訂）_精査後.csv';
  const vocabName = resolvedCsvFileName.replace(/\.csv$/i, '');
  const baseConfig = { timer, totalQuestions: Math.min(numQ, vocabData.length), vocabData, csvFileName: resolvedCsvFileName, onResult: handleResult };
  const config = { ...baseConfig, onSessionEnd: handleSessionEnd };

  return (
    <>
      {swUpdate && (
        <div className="sw-update-bar">
          <span>🆕 アプリが更新されました</span>
          <button className="sw-update-btn" onClick={() => window.__swReload()}>再読み込み</button>
          <button className="sw-update-btn" style={{fontSize:11, padding:'4px 8px', opacity:0.6}} onClick={() => setSwUpdate(false)}>✕</button>
        </div>
      )}
      {swUpToDate && (
        <div className="sw-update-bar" style={{background:'#2BC48A'}}>
          <span>✨ 今のアプリは最新です</span>
          <button className="sw-update-btn" style={{fontSize:11, padding:'4px 8px', opacity:0.6}} onClick={() => setSwUpToDate(false)}>✕</button>
        </div>
      )}
      {view === 'compare' ? (
        <div className="variant-showcase">
          <div className="variant-showcase-header"><h1>SwipeStudy</h1><p>スタイルを比較</p></div>
          <div className="variant-showcase-grid">
            {Object.values(VARIANTS).map(v => (
              <div className="variant-col" key={v.id}>
                <div className="variant-label"><div className="variant-label-name">{v.name}</div><div className="variant-label-sub">{v.sub}</div></div>
                <div className="phone-frame"><VocabApp key={vocabKey} variant={v} config={baseConfig}/></div>
              </div>
            ))}
          </div>
        </div>
      ) : appMode === 'title' ? (
        <div className="fullscreen-stage">
          <TitleMode vocabData={vocabData} csvFileName={csvFileName} onStart={handleTitleStart} onCsvSwitch={handleCsvSwitch} variant={variant}/>
        </div>
      ) : appMode === 'playing' ? (
        <div className="fullscreen-stage">
          <VocabApp key={vocabKey} variant={variant} config={config}/>
        </div>
      ) : appMode === 'memory' ? (
        <div className="fullscreen-stage">
          <MemoryMode batch={currentBatch} batchNum={batchIdx+1} totalBatches={totalBatches} onDone={handleMemoryDone} variant={variant}/>
        </div>
      ) : appMode === 'confirm' ? (
        <div className="fullscreen-stage">
          <ConfirmMode key={`confirm-${batchIdx}`} batch={currentBatch} batchNum={batchIdx+1} totalBatches={totalBatches} fallbackPool={vocabData.map(d=>d.correct)} onPass={handleConfirmPass} onFail={handleConfirmFail} variant={variant} csvFileName={resolvedCsvFileName}/>
        </div>
      ) : appMode === 'result' ? (
        <div className="fullscreen-stage">
          <ResultMode sessionStats={sessionStats} missedWords={batches.flat()} vocabData={vocabData} csvFileName={baseConfig.csvFileName} vocabName={vocabName} onRetry={handleRetry} onRestart={handleRestart} onExport={exportCSV} variant={variant}/>
        </div>
      ) : null}

      <div style={{ position:'fixed', bottom:16, right:16, zIndex:1000 }}>
        <button onClick={() => setTweaksOpen(o => !o)}
          style={{ width:40, height:40, border:'none', borderRadius:'50%', background:'#111', color:'#fff', fontSize:18, cursor:'pointer', display:'grid', placeItems:'center', boxShadow:'0 4px 16px rgba(0,0,0,0.3)' }}>
          ⚙
        </button>
      </div>

      {tweaksOpen && (
        <div className="tweaks-panel">
          <h4>Tweaks</h4>
          <div className="tweaks-row">
            <label>View</label>
            <div className="tweaks-btns">
              <button className={`tweaks-btn ${view==='single'?'active':''}`} onClick={()=>setView('single')}>Single</button>
              <button className={`tweaks-btn ${view==='compare'?'active':''}`} onClick={()=>setView('compare')}>Compare</button>
            </div>
          </div>
          {view === 'single' && (
            <div className="tweaks-row tweaks-row-stack">
              <label>Style</label>
              <div className="tweaks-btns tweaks-btns-wrap">
                {Object.values(VARIANTS).map(v => (
                  <button key={v.id} className={`tweaks-btn ${variantId===v.id?'active':''}`} onClick={()=>setVariantId(v.id)}>{v.name}</button>
                ))}
              </div>
            </div>
          )}
          <div className="tweaks-row">
            <label>Timer</label>
            <div className="tweaks-btns">
              <button className={`tweaks-btn ${timer?'active':''}`} onClick={()=>setTimer(true)}>On</button>
              <button className={`tweaks-btn ${!timer?'active':''}`} onClick={()=>setTimer(false)}>Off</button>
            </div>
          </div>

          <div className="csv-section">
            <div style={{display:'flex', justifyContent:'space-between', alignItems:'center'}}>
              <span style={{fontSize:11, fontWeight:700}}>📊 保存済み結果</span>
              <span style={{fontSize:11, color:'#888'}}>{resultsCount} 件</span>
            </div>
            <div style={{display:'flex', gap:6, marginTop:6}}>
              <button className="tweaks-btn active" style={{flex:1, background:'#2BC48A'}} onClick={exportCSV}>↓ CSV出力 ({resultsCount})</button>
              <button className="tweaks-btn" style={{flex:1, color:'#FF5B8A'}} onClick={clearResults}>クリア</button>
            </div>
          </div>

          <div className="csv-section">
            <button className="tweaks-btn" style={{width:'100%', padding:'8px 0', fontSize:12, background:'#f0f0f0', marginBottom:6}}
              onClick={() => { checkSwUpdate(); }}>
              🔄 更新チェック
            </button>
            <button className="tweaks-btn" style={{width:'100%', padding:'8px 0', fontSize:12, background:'#f0f0f0'}}
              onClick={() => { setTweaksOpen(false); handleRestart(); }}>
              ← タイトルに戻る
            </button>
          </div>
        </div>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
