<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<title>SwipeStudy — スワイプ暗記</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<link rel="manifest" href="manifest.json"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="SwipeStudy"/>
<link rel="apple-touch-icon" href="icon.svg"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=M+PLUS+Rounded+1c:wght@700;800;900&family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Space+Grotesk:wght@500;700;800&family=Fraunces:opsz,wght@9..144,600;9..144,700&family=JetBrains+Mono:wght@500;700&family=Noto+Serif+JP:wght@500;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; background: #0a0a0a; }
body { font-family: 'Plus Jakarta Sans', system-ui, sans-serif; color: #111; }
#root { width: 100%; height: 100vh; height: 100dvh; overflow: hidden; }

.fullscreen-stage {
  width: 100vw; height: 100vh; height: 100dvh;
  display: grid; place-items: center;
  background: #111; overflow: hidden;
}
.fullscreen-stage .vocab-app { width: 100%; height: 100%; max-width: 480px; }

.variant-showcase {
  width: 100vw; height: 100vh;
  background: #0b0a10;
  background-image:
    radial-gradient(circle at 20% 30%, rgba(255,60,140,0.08) 0%, transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(80,180,255,0.08) 0%, transparent 40%);
  overflow: auto; padding: 48px 24px 80px;
}
.variant-showcase-header { text-align: center; color: #fff; margin-bottom: 40px; }
.variant-showcase-header h1 { font-family: 'Space Grotesk', sans-serif; font-size: 32px; font-weight: 800; letter-spacing: -0.03em; margin: 0 0 8px 0; }
.variant-showcase-header p { font-size: 14px; opacity: 0.55; margin: 0; }
.variant-showcase-grid { display: flex; gap: 44px; justify-content: center; flex-wrap: wrap; align-items: flex-start; }
.variant-col { display: flex; flex-direction: column; align-items: center; gap: 16px; }
.variant-label { color: #fff; font-family: 'Space Grotesk', sans-serif; }
.variant-label-name { font-size: 18px; font-weight: 800; letter-spacing: -0.02em; }
.variant-label-sub { font-size: 12px; opacity: 0.5; margin-top: 2px; text-align: center; }

/* ── vocab-app ── */
.vocab-app {
  width: 100%; height: 100%;
  display: flex; flex-direction: column;
  position: relative; overflow: hidden;
  font-family: 'Plus Jakarta Sans', -apple-system, system-ui, sans-serif;
  -webkit-font-smoothing: antialiased;
  user-select: none; -webkit-user-select: none; touch-action: none;
  padding-top: env(safe-area-inset-top, 0px);
}

/* ── Backgrounds ── */
.vocab-app.variant-bubble { background: linear-gradient(155deg,#FFE6EC 0%,#FFF6D9 45%,#E5F3FF 100%); }
.vocab-app.variant-bubble::before {
  content:''; position:absolute; inset:-40px;
  background: radial-gradient(circle at 12% 18%,rgba(255,106,158,.38) 0,transparent 28%), radial-gradient(circle at 88% 22%,rgba(124,92,255,.28) 0,transparent 30%), radial-gradient(circle at 78% 88%,rgba(62,195,168,.32) 0,transparent 32%), radial-gradient(circle at 18% 82%,rgba(255,192,68,.3) 0,transparent 30%);
  filter:blur(30px); z-index:0; pointer-events:none;
}
.vocab-app.variant-pop { background: #FFEC5C; }
.vocab-app.variant-pop::before {
  content:''; position:absolute; inset:0;
  background-image: radial-gradient(circle at 2px 2px,rgba(17,17,17,0.09) 1.4px,transparent 1.6px);
  background-size:18px 18px; z-index:0; pointer-events:none;
}
.vocab-app.variant-neo { background: #0E0B1E; }
.vocab-app.variant-neo::before {
  content:''; position:absolute; inset:0;
  background: radial-gradient(ellipse at 20% 10%,rgba(255,60,140,0.28) 0%,transparent 45%), radial-gradient(ellipse at 85% 80%,rgba(80,230,255,0.22) 0%,transparent 50%), linear-gradient(180deg,transparent 0%,rgba(10,6,25,0.6) 100%);
  z-index:0; pointer-events:none;
}
.vocab-app.variant-modern { background: #F5F4F1; }
.vocab-app.variant-modern::before {
  content:''; position:absolute; inset:0;
  background-image: linear-gradient(rgba(0,0,0,0.035) 1px,transparent 1px), linear-gradient(90deg,rgba(0,0,0,0.035) 1px,transparent 1px);
  background-size:48px 48px; pointer-events:none; z-index:0;
}
.vocab-app.variant-cool { background: linear-gradient(160deg,#0A1628 0%,#1E2A4A 50%,#0F1B33 100%); }
.vocab-app.variant-cool::before {
  content:''; position:absolute; inset:0;
  background-image: radial-gradient(circle at 20% 30%,rgba(0,212,255,0.15) 0%,transparent 40%), radial-gradient(circle at 80% 70%,rgba(123,92,255,0.12) 0%,transparent 45%);
  pointer-events:none; z-index:0;
}
.vocab-app.variant-cool::after {
  content:''; position:absolute; inset:0;
  background-image: linear-gradient(rgba(0,212,255,0.04) 1px,transparent 1px), linear-gradient(90deg,rgba(0,212,255,0.04) 1px,transparent 1px);
  background-size:32px 32px; pointer-events:none; z-index:0;
}
.vocab-app.variant-zen { background: #F8F1E4; background-image: radial-gradient(circle at 15% 20%,rgba(193,91,60,0.08) 0%,transparent 40%), radial-gradient(circle at 85% 80%,rgba(107,127,90,0.08) 0%,transparent 45%); }
.vocab-app.variant-zen::before {
  content:''; position:absolute; inset:0;
  background-image: radial-gradient(ellipse 1px 1px at 10% 20%,rgba(43,37,32,0.08),transparent), radial-gradient(ellipse 1px 1px at 70% 60%,rgba(43,37,32,0.06),transparent), radial-gradient(ellipse 2px 1px at 40% 80%,rgba(43,37,32,0.05),transparent), radial-gradient(ellipse 1px 1px at 85% 15%,rgba(43,37,32,0.07),transparent);
  background-size:180px 180px; pointer-events:none; z-index:0;
}
.vocab-app.variant-three_d { background: linear-gradient(155deg,#FFDDD0 0%,#FFE8DC 50%,#E8D5FF 100%); }
.vocab-app.variant-three_d::before {
  content:''; position:absolute; inset:-40px;
  background: radial-gradient(circle at 15% 20%,rgba(255,140,107,0.35) 0,transparent 30%), radial-gradient(circle at 85% 80%,rgba(139,125,255,0.3) 0,transparent 35%);
  filter:blur(40px); z-index:0; pointer-events:none;
}
.vocab-app.variant-ghibli { background: linear-gradient(180deg,#87CEEB 0%,#B0E0F8 40%,#F0F8FF 100%); }
.vocab-app.variant-ghibli::before {
  content:''; position:absolute; inset:0;
  background: radial-gradient(ellipse 120px 60px at 20% 30%,rgba(255,255,255,0.7) 0%,transparent 100%), radial-gradient(ellipse 80px 40px at 70% 20%,rgba(255,255,255,0.6) 0%,transparent 100%), radial-gradient(ellipse 160px 70px at 55% 45%,rgba(255,255,255,0.5) 0%,transparent 100%);
  pointer-events:none; z-index:0;
}
.vocab-app.variant-art { background: #FFFCF5; }
.vocab-app.variant-art::before {
  content:''; position:absolute; top:0; left:0; right:0; height:6px;
  background: linear-gradient(90deg,#E63946 33%,#1D3557 33% 66%,#F4A261 66%);
  z-index:5; pointer-events:none;
}
.vocab-app.variant-art::after {
  content:''; position:absolute; inset:0;
  background-image: linear-gradient(rgba(0,0,0,0.025) 1px,transparent 1px), linear-gradient(90deg,rgba(0,0,0,0.025) 1px,transparent 1px);
  background-size:40px 40px; pointer-events:none; z-index:0;
}
.vocab-app.variant-wafu { background: #F6EEE1; background-image: radial-gradient(circle at 10% 15%,rgba(166,38,57,0.06) 0%,transparent 50%), radial-gradient(circle at 90% 85%,rgba(28,24,20,0.04) 0%,transparent 50%); }
.vocab-app.variant-wafu::before {
  content:''; position:absolute; left:0; top:0; bottom:0; width:4px;
  background: linear-gradient(180deg,#A62639 0%,#6B1427 100%);
  z-index:5; pointer-events:none;
}

/* ── Stats bar ── */
.stats-bar { position:relative; z-index:3; padding:6px 18px 4px; display:flex; flex-direction:column; gap:6px; }
.variant-neo .stats-bar, .variant-cool .stats-bar { color:#fff; }
.variant-zen .stats-bar { color:#2B2520; }
.variant-wafu .stats-bar { color:#1C1814; }
.variant-art .stats-bar { color:#1D1D1B; }

.stats-top { display:flex; align-items:center; justify-content:space-between; gap:10px; }
.stats-counter { display:flex; align-items:baseline; gap:2px; font-family:'Space Grotesk',sans-serif; font-weight:700; }
.stats-counter-cur { font-size:28px; letter-spacing:-0.02em; }
.stats-counter-sep { font-size:18px; opacity:0.4; margin:0 2px; }
.stats-counter-total { font-size:18px; opacity:0.55; }
.stats-pills { display:flex; gap:6px; flex-wrap:wrap; justify-content:flex-end; }

.pill { display:inline-flex; align-items:center; gap:4px; height:26px; padding:0 10px; border-radius:999px; font-size:12px; font-weight:700; background:rgba(255,255,255,0.7); backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px); box-shadow:0 1px 0 rgba(0,0,0,0.04),0 2px 6px rgba(0,0,0,0.04); }
.variant-pop .pill { background:#fff; border:2px solid #111; box-shadow:2px 2px 0 #111; }
.variant-neo .pill { background:rgba(255,255,255,0.08); color:#fff; border:1px solid rgba(255,255,255,0.15); backdrop-filter:blur(16px); }
.variant-cool .pill { background:rgba(0,212,255,0.08); border:1px solid rgba(0,212,255,0.25); color:#E6F2FF; font-family:'JetBrains Mono',monospace; font-size:12px; }
.variant-modern .pill { background:#fff; border:1px solid #111; border-radius:0; box-shadow:none; }
.variant-zen .pill { background:rgba(253,248,240,0.8); border:1px solid rgba(43,37,32,0.2); color:#2B2520; }
.variant-art .pill { background:#fff; border:2px solid #1D1D1B; border-radius:0; box-shadow:none; }
.variant-wafu .pill { background:rgba(246,238,225,0.9); border:1px solid rgba(166,38,57,0.3); color:#1C1814; border-radius:2px; }
.variant-ghibli .pill { background:rgba(253,250,240,0.85); border:1px solid rgba(74,157,184,0.25); color:#2C4156; }

.pill-dot { width:8px; height:8px; border-radius:50%; }
.pill-correct .pill-dot { background:#2BC48A; box-shadow:0 0 0 3px rgba(43,196,138,.18); }
.pill-wrong .pill-dot { background:#FF5B8A; box-shadow:0 0 0 3px rgba(255,91,138,.18); }
.pill-acc { gap:6px; padding:0 12px; }
.pill-acc strong { font-size:13px; color:var(--accent); }
.variant-neo .pill-acc strong { color:#FF7FA6; }
.variant-cool .pill-acc strong { color:#00D4FF; }
.variant-modern .pill-acc strong { color:#111; }
.variant-zen .pill-acc strong { color:#C15B3C; }
.variant-art .pill-acc strong { color:#E63946; }
.variant-wafu .pill-acc strong { color:#A62639; }
.variant-ghibli .pill-acc strong { color:#4A9DB8; }

.stats-bars { display:flex; gap:10px; }
.bar { flex:1; display:flex; align-items:center; gap:8px; }
.bar-label { font-size:10px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; opacity:0.55; width:38px; flex-shrink:0; }
.bar-track { flex:1; height:8px; background:rgba(0,0,0,0.08); border-radius:999px; overflow:hidden; position:relative; }
.variant-neo .bar-track { background:rgba(255,255,255,0.1); }
.variant-cool .bar-track { background:rgba(0,212,255,0.1); }
.variant-pop .bar-track { height:12px; border:2px solid #111; background:#fff; border-radius:999px; }
.variant-modern .bar-track { background:#E5E3DE; border-radius:0; height:4px; }
.variant-zen .bar-track { background:rgba(43,37,32,0.1); }
.variant-art .bar-track { background:#E8E5DE; border-radius:0; height:6px; }
.variant-wafu .bar-track { background:rgba(28,24,20,0.1); border-radius:0; height:4px; }
.bar-fill { height:100%; border-radius:999px; transition:width 0.4s cubic-bezier(.2,.9,.3,1.3); }
.bar-fill-progress { background:linear-gradient(90deg,var(--accent2) 0%,var(--accent) 100%); }
.bar-fill-acc { background:linear-gradient(90deg,#2BC48A 0%,#7DE6B8 100%); }
.variant-pop .bar-fill { border-radius:0; }
.variant-modern .bar-fill { background:#111 !important; border-radius:0; }
.variant-zen .bar-fill { background:linear-gradient(90deg,#C15B3C 0%,#D98863 100%) !important; }
.variant-cool .bar-fill { background:linear-gradient(90deg,#00D4FF 0%,#7B5CFF 100%) !important; box-shadow:0 0 12px rgba(0,212,255,0.5); }
.variant-art .bar-fill-progress { background:#E63946 !important; border-radius:0; }
.variant-art .bar-fill-acc { background:#1D3557 !important; border-radius:0; }
.variant-wafu .bar-fill { background:linear-gradient(90deg,#A62639,#D4556A) !important; border-radius:0; }
.variant-ghibli .bar-fill-progress { background:linear-gradient(90deg,#4A9DB8,#F4B942) !important; }

.stats-bottom { display:flex; justify-content:space-between; align-items:center; gap:10px; }
.combo { display:inline-flex; align-items:center; gap:6px; font-family:'Space Grotesk',sans-serif; font-weight:800; padding:4px 10px 4px 8px; border-radius:999px; background:rgba(0,0,0,0.05); transition:all 0.3s; }
.combo-flame { font-size:16px; }
.combo-num { font-size:20px; letter-spacing:-0.02em; }
.combo-label { font-size:10px; letter-spacing:0.12em; opacity:0.55; }
.combo-best { font-size:10px; opacity:0.5; margin-left:4px; }
.combo.hot { background:linear-gradient(90deg,#FF5B8A,#FFB547); color:#fff; box-shadow:0 4px 14px rgba(255,91,138,0.35); animation:comboPulse 0.6s ease; }
.variant-neo .combo { background:rgba(255,255,255,0.08); color:#fff; }
.variant-neo .combo.hot { background:linear-gradient(90deg,#FF3C8C,#7C5CFF); }
.variant-cool .combo { background:rgba(0,212,255,0.1); border:1px solid rgba(0,212,255,0.25); color:#E6F2FF; }
.variant-cool .combo.hot { background:linear-gradient(90deg,#00D4FF,#7B5CFF); color:#0A1628; }
.variant-modern .combo { background:#fff; border:1px solid #111; border-radius:0; color:#111; }
.variant-modern .combo.hot { background:#111; color:#fff; }
.variant-zen .combo { background:rgba(253,248,240,0.8); border:1px solid rgba(43,37,32,0.2); color:#2B2520; }
.variant-zen .combo.hot { background:#C15B3C; color:#F8F1E4; border-color:#C15B3C; }
.variant-art .combo { background:#fff; border:2px solid #1D1D1B; border-radius:0; color:#1D1D1B; }
.variant-art .combo.hot { background:#E63946; color:#fff; border-color:#E63946; }
.variant-wafu .combo { background:rgba(246,238,225,0.9); border:1px solid rgba(166,38,57,0.25); color:#1C1814; border-radius:2px; }
.variant-wafu .combo.hot { background:#A62639; color:#F6EEE1; border-color:#A62639; }
.variant-ghibli .combo { background:rgba(253,250,240,0.85); color:#2C4156; border:1px solid rgba(74,157,184,0.2); }
.variant-ghibli .combo.hot { background:#F4B942; color:#fff; }

@keyframes comboPulse { 0%{transform:scale(1)} 40%{transform:scale(1.12)} 100%{transform:scale(1)} }

.timer { position:relative; width:42px; height:42px; display:grid; place-items:center; flex-shrink:0; }
.timer-ring { position:absolute; inset:0; transform:rotate(-90deg); width:42px; height:42px; }
.timer-track { stroke:rgba(0,0,0,0.08); stroke-width:3; fill:none; }
.variant-neo .timer-track { stroke:rgba(255,255,255,0.12); }
.variant-cool .timer-track { stroke:rgba(0,212,255,0.15); }
.variant-modern .timer-track { stroke:#E5E3DE; }
.variant-zen .timer-track { stroke:rgba(43,37,32,0.12); }
.timer-fill { stroke:var(--accent); stroke-width:3; fill:none; stroke-linecap:round; transition:stroke-dasharray 0.9s linear; }
.variant-cool .timer-fill { stroke:#00D4FF; filter:drop-shadow(0 0 4px #00D4FF); }
.variant-modern .timer-fill { stroke:#111; }
.variant-zen .timer-fill { stroke:#C15B3C; }
.variant-art .timer-fill { stroke:#E63946; }
.variant-wafu .timer-fill { stroke:#A62639; }
.variant-ghibli .timer-fill { stroke:#4A9DB8; }
.timer.danger .timer-fill { stroke:#FF5B8A; animation:timerShake 0.3s infinite; }
.timer-num { font-family:'Space Grotesk',sans-serif; font-weight:800; font-size:14px; position:relative; z-index:1; }
.timer.danger .timer-num { color:#FF5B8A; }
@keyframes timerShake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-1px)} 75%{transform:translateX(1px)} }

/* ── Bottom Dock ── */
.bottom-dock {
  position:relative; z-index:4;
  margin: 0 12px 6px;
  padding: 10px 10px 8px;
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
  align-items: stretch;
  border-radius: 18px;
  background: rgba(0,0,0,0.05);
}
.variant-neo .bottom-dock, .variant-cool .bottom-dock { background: rgba(255,255,255,0.08); }
.variant-modern .bottom-dock { background: #fff; border: 1px solid #111; border-radius: 0; }
.variant-zen .bottom-dock { background: rgba(253,248,240,0.8); border: 1px solid rgba(43,37,32,0.2); }
.variant-art .bottom-dock { background: #fff; border: 2px solid #1D1D1B; border-radius: 0; }
.variant-wafu .bottom-dock { background: rgba(246,238,225,0.9); border: 1px solid rgba(166,38,57,0.25); border-radius: 2px; }
.variant-ghibli .bottom-dock { background: rgba(253,250,240,0.85); border: 1px solid rgba(74,157,184,0.2); }
.dock-row {
  display: flex; flex-direction: column;
  gap: 5px; min-width: 0;
}
.dock-row + .dock-row {
  border-left: 1px dashed rgba(0,0,0,0.10);
  padding-left: 10px;
}
.variant-neo .dock-row + .dock-row,
.variant-cool .dock-row + .dock-row { border-left-color: rgba(255,255,255,0.10); }
.dock-graph { height: 40px; position:relative; border-radius:10px; background:rgba(0,0,0,0.05); overflow:hidden; }
.variant-neo .dock-graph, .variant-cool .dock-graph { background:rgba(255,255,255,0.08); }
.variant-modern .dock-graph { background:#fff; border:1px solid #111; border-radius:0; }
.variant-zen .dock-graph { background:rgba(253,248,240,0.8); border:1px solid rgba(43,37,32,0.2); }
.variant-art .dock-graph { background:#fff; border:2px solid #1D1D1B; border-radius:0; }
.variant-wafu .dock-graph { background:rgba(246,238,225,0.9); border:1px solid rgba(166,38,57,0.25); border-radius:2px; }
.variant-ghibli .dock-graph { background:rgba(253,250,240,0.85); border:1px solid rgba(74,157,184,0.2); }
.dock-graph svg { width:100%; height:100%; display:block; }
.dock-stat { display:flex; align-items:center; justify-content:space-between; gap:4px; flex-wrap:wrap; }
.dock-stat-left { display:flex; align-items:baseline; gap:5px; min-width:0; }
.dock-stat-icon { font-size:9px; opacity:0.6; display:flex; align-items:center; }
.dock-stat-jp { font-size:10px; font-weight:800; opacity:0.70; letter-spacing:0.02em; }
.dock-stat-val { display:flex; align-items:baseline; gap:2px; font-family:'Space Grotesk',sans-serif; font-weight:800; line-height:1; }
.dock-stat-num { font-size:20px; font-variant-numeric:tabular-nums; transition:color 0.3s; }
.dock-stat-unit { font-size:10px; font-weight:700; opacity:0.55; }
.dock-stat-num.bump { animation:dockNumBump 0.42s cubic-bezier(.2,.9,.3,1.3); }
@keyframes dockNumBump { 0%{transform:scale(1)} 40%{transform:scale(1.18)} 100%{transform:scale(1)} }
.dock-stat-num.acc-good { color:#2BC48A; }
.dock-stat-num.acc-mid  { color:#C87D00; }
.dock-stat-num.acc-bad  { color:#FF5B8A; }
.variant-neo .dock-stat-num, .variant-cool .dock-stat-num { color:#fff; }
.variant-neo .dock-stat-num.acc-good, .variant-cool .dock-stat-num.acc-good { color:#5be3a8; }
.variant-neo .dock-stat-num.acc-mid, .variant-cool .dock-stat-num.acc-mid { color:#F5D47F; }
.variant-neo .dock-stat-num.acc-bad, .variant-cool .dock-stat-num.acc-bad { color:#ff8aaf; }
.dock-badge {
  display:inline-flex; align-items:center; gap:3px;
  padding:2px 7px; border-radius:999px;
  font-family:'Space Grotesk',sans-serif; font-size:9px; font-weight:800; letter-spacing:0.03em;
  background:rgba(0,0,0,0.06);
  white-space:nowrap;
}
.variant-neo .dock-badge, .variant-cool .dock-badge { background:rgba(255,255,255,0.10); color:#fff; }
.dock-flash {
  position:absolute; inset:0; border-radius:18px; pointer-events:none;
  background: transparent;
  transition: background 0.35s;
}
.dock-flash.ok { background: rgba(43,196,138,0.22); }
.dock-flash.ng { background: rgba(255,91,138,0.22); }
/* Dot trail */
.dt-wrap { display:flex; gap:3px; align-items:flex-end; height:100%; padding:4px 6px; }
.dt-cell { flex:1; min-width:0; border-radius:4px 4px 2px 2px; background:rgba(0,0,0,0.08); transition:background 0.3s, height 0.4s; }
.variant-neo .dt-cell, .variant-cool .dt-cell { background:rgba(255,255,255,0.12); }
.dt-cell.ok { background:linear-gradient(180deg,#5be3a8,#2BC48A); }
.dt-cell.ng { background:linear-gradient(180deg,#ff8aaf,#FF5B8A); }
.dt-cell.cur { box-shadow:0 0 0 1.5px rgba(255,255,255,0.9), 0 0 0 3px var(--accent); animation:dtCurPulse 1.4s ease-in-out infinite; }
@keyframes dtCurPulse { 0%,100%{transform:scaleY(1)} 50%{transform:scaleY(1.10)} }
.dt-cell.entered { animation:dtEnter 0.4s cubic-bezier(.2,.9,.3,1.3); }
@keyframes dtEnter { 0%{transform:translateY(6px) scale(0.5);opacity:0} 60%{transform:translateY(-2px) scale(1.12);opacity:1} 100%{transform:translateY(0) scale(1);opacity:1} }
/* Speed bars */
.sb-wrap { display:flex; align-items:flex-end; gap:0; height:100%; padding:4px 6px; }
.sb-cell { flex:1; min-width:1px; border-radius:2px 2px 1px 1px; opacity:0.85; transition:height 0.5s cubic-bezier(.2,.9,.3,1.3); }
.sb-cell.empty { background:rgba(0,0,0,0.08); opacity:1; }
.variant-neo .sb-cell.empty, .variant-cool .sb-cell.empty { background:rgba(255,255,255,0.10); }
.sb-cell.ok { background:linear-gradient(180deg,#5be3a8,#2BC48A); }
.sb-cell.ng { background:linear-gradient(180deg,#ff8aaf,#FF5B8A); }
.sb-cell.entered { animation:sbRise 0.5s cubic-bezier(.2,.9,.3,1.3); }
@keyframes sbRise { 0%{transform:scaleY(0.05);transform-origin:bottom} 60%{transform:scaleY(1.10);transform-origin:bottom} 100%{transform:scaleY(1);transform-origin:bottom} }
.sb-avg { position:absolute; left:6px; right:6px; height:0; border-top:1.5px dashed rgba(0,0,0,0.28); pointer-events:none; transition:bottom 0.5s cubic-bezier(.2,.9,.3,1.3); }
.variant-neo .sb-avg, .variant-cool .sb-avg { border-top-color:rgba(255,255,255,0.40); }
.sb-avg-tag { position:absolute; right:0; top:-9px; font-family:'Space Grotesk',sans-serif; font-size:8px; font-weight:800; background:#111; color:#fff; padding:2px 4px; border-radius:3px; }
.variant-neo .sb-avg-tag, .variant-cool .sb-avg-tag { background:#fff; color:#111; }

/* ── Mini Stats (AccuracyRing + SpeedGauge) ── */
.mini-stats { display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:6px 12px 2px; position:relative; z-index:4; }
.ms { position:relative; background:rgba(0,0,0,0.05); border:1px solid rgba(0,0,0,0.10); border-radius:16px; padding:10px 12px; display:grid; grid-template-columns:56px 1fr; align-items:center; gap:10px; overflow:hidden; transition:border-color 0.35s, box-shadow 0.35s; }
.ms.tier-good { border-color:rgba(43,196,138,0.50); box-shadow:0 0 18px rgba(43,196,138,0.12); }
.ms.tier-mid  { border-color:rgba(255,183,71,0.50);  box-shadow:0 0 18px rgba(255,183,71,0.12); }
.ms.tier-bad  { border-color:rgba(255,91,138,0.50);   box-shadow:0 0 18px rgba(255,91,138,0.12); }
.ms.flash-ok { animation:msFlashOk 0.55s ease-out; }
.ms.flash-ng { animation:msFlashNg 0.55s ease-out; }
@keyframes msFlashOk { 0%{background:rgba(43,196,138,0.22);transform:scale(1.02)} 100%{background:rgba(0,0,0,0.05);transform:scale(1)} }
@keyframes msFlashNg { 0%{background:rgba(255,91,138,0.22);transform:scale(1.02)} 100%{background:rgba(0,0,0,0.05);transform:scale(1)} }
.variant-neo .ms, .variant-cool .ms { background:rgba(255,255,255,0.07); border-color:rgba(255,255,255,0.12); }
.ms-ring { position:relative; width:56px; height:56px; }
.ms-ring svg { width:100%; height:100%; transform:rotate(-90deg); }
.ms-ring .ring-bg { fill:none; stroke:rgba(0,0,0,0.10); stroke-width:6; }
.variant-neo .ms-ring .ring-bg, .variant-cool .ms-ring .ring-bg { stroke:rgba(255,255,255,0.12); }
.ms-ring .ring-fg { fill:none; stroke-width:6; stroke-linecap:round; transition:stroke-dashoffset 0.55s cubic-bezier(.2,.9,.3,1.4), stroke 0.4s; filter:drop-shadow(0 0 4px currentColor); }
.ms-ring .ring-center { position:absolute; inset:0; display:grid; place-items:center; font-family:'Bungee',sans-serif; font-size:11px; }
.ms-gauge { position:relative; width:56px; height:56px; }
.ms-gauge svg { width:100%; height:100%; }
.ms-gauge .gauge-bg { fill:none; stroke:rgba(0,0,0,0.10); stroke-width:6; stroke-linecap:round; }
.variant-neo .ms-gauge .gauge-bg, .variant-cool .ms-gauge .gauge-bg { stroke:rgba(255,255,255,0.12); }
.ms-gauge .gauge-fg { fill:none; stroke-width:6; stroke-linecap:round; transition:stroke-dasharray 0.55s cubic-bezier(.2,.9,.3,1.4), stroke 0.4s; filter:drop-shadow(0 0 4px currentColor); }
.ms-gauge .gauge-needle { transition:transform 0.55s cubic-bezier(.2,.9,.3,1.4); transform-origin:28px 32px; }
.ms-gauge .gauge-emoji { position:absolute; left:0; right:0; bottom:2px; text-align:center; font-size:14px; }
.ms-text { min-width:0; display:flex; flex-direction:column; gap:2px; }
.ms-label { font-family:'Space Grotesk',sans-serif; font-size:9px; font-weight:800; letter-spacing:0.14em; opacity:0.55; text-transform:uppercase; display:flex; align-items:center; gap:4px; }
.ms-label .ms-jp { letter-spacing:0.04em; opacity:0.9; font-size:10px; }
.ms-big { display:flex; align-items:baseline; gap:3px; font-family:'Bungee',sans-serif; line-height:1; }
.ms-num { font-size:26px; font-variant-numeric:tabular-nums; transition:color 0.35s; }
.ms-num.good { color:#2BC48A; }
.ms-num.mid  { color:#C87D00; }
.ms-num.bad  { color:#FF5B8A; }
.ms-num.bump { animation:msNumBump 0.45s cubic-bezier(.2,.9,.3,1.5); }
@keyframes msNumBump { 0%{transform:scale(1)} 40%{transform:scale(1.22)} 100%{transform:scale(1)} }
.ms-unit { font-family:'Space Grotesk',sans-serif; font-weight:800; font-size:10px; opacity:0.55; letter-spacing:0.04em; }
.ms-tier { display:inline-flex; align-items:center; align-self:flex-start; padding:2px 7px; border-radius:999px; font-family:'Space Grotesk',sans-serif; font-size:9px; font-weight:900; letter-spacing:0.10em; text-transform:uppercase; margin-top:2px; }
.ms-tier.good { background:rgba(43,196,138,0.15); color:#0d5c35; }
.ms-tier.mid  { background:rgba(255,183,71,0.15);  color:#7a4800; }
.ms-tier.bad  { background:rgba(255,91,138,0.15);   color:#8a1a3a; }
.variant-neo .ms-tier, .variant-cool .ms-tier { background:rgba(255,255,255,0.08); color:#fff; }
.variant-neo .ms-tier.good, .variant-cool .ms-tier.good { background:rgba(43,196,138,0.25); color:#C9FFE3; }
.variant-neo .ms-tier.mid,  .variant-cool .ms-tier.mid  { background:rgba(255,183,71,0.25);  color:#FFF3C2; }
.variant-neo .ms-tier.bad,  .variant-cool .ms-tier.bad  { background:rgba(255,91,138,0.25);  color:#FFD2DD; }

/* ── Swipe stage ── */
.swipe-stage {
  flex:1; min-height:0; position:relative; z-index:2;
  padding:clamp(4px,1.2vh,14px) 12px calc(env(safe-area-inset-bottom, 0px) + clamp(6px,1.5vh,20px));
  display:grid;
  grid-template-areas:". up ." "left card right" ". down .";
  grid-template-columns:auto 1fr auto;
  grid-template-rows:auto 1fr auto;
  gap:clamp(6px,1.2vh,12px);
  align-items:center; justify-items:center;
}

.choice {
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px;
  padding:10px 14px; min-width:84px;
  border:none; border-radius:18px; font-family:inherit; font-size:15px; font-weight:700;
  color:#111; background:#fff; cursor:pointer;
  box-shadow:0 6px 18px rgba(0,0,0,0.08),0 1px 2px rgba(0,0,0,0.04);
  transition:transform 0.22s cubic-bezier(.2,.9,.3,1.3), box-shadow 0.22s, background 0.25s, color 0.25s;
  -webkit-tap-highlight-color:transparent;
}
.choice-arrow { font-size:18px; font-weight:900; line-height:1; color:var(--accent); opacity:0.7; }
.choice-label { white-space:nowrap; font-size:15px; letter-spacing:-0.01em; }

.choice-up    { grid-area:up;    flex-direction:column-reverse; }
.choice-down  { grid-area:down; }
.choice-left  { grid-area:left;  padding:14px 8px; flex-direction:column; align-items:center; gap:8px; min-width:60px; max-width:88px; }
.choice-right { grid-area:right; padding:14px 8px; flex-direction:column; align-items:center; gap:8px; min-width:60px; max-width:88px; }
.choice-left .choice-label, .choice-right .choice-label { writing-mode:vertical-rl; text-orientation:mixed; letter-spacing:0.08em; line-height:1.1; }

.choice.aim { background:var(--accent); color:#fff; }
.choice-up.aim    { transform:scale(1.06); }
.choice-down.aim  { transform:scale(1.06); }
.choice-left.aim  { transform:scale(1.06); }
.choice-right.aim { transform:scale(1.06); }
.choice.aim .choice-arrow { color:#fff; opacity:1; }

.choice.correct { background:#2BC48A; color:#fff; box-shadow:0 8px 24px rgba(43,196,138,0.45); animation:popIn 0.4s ease; }
.choice.correct .choice-arrow { color:#fff; }
.choice.wrong { background:#FF5B8A; color:#fff; animation:shake 0.4s ease; }
.choice.wrong .choice-arrow { color:#fff; }
.choice.reveal { background:#2BC48A; color:#fff; box-shadow:0 0 0 3px rgba(43,196,138,0.3); animation:glow 1s ease infinite alternate; }
.choice.reveal .choice-arrow { color:#fff; }

@keyframes popIn { 0%{transform:scale(0.9)} 50%{transform:scale(1.15)} 100%{transform:scale(1.06)} }
.choice-up.correct    { animation-name:popInUp; }
.choice-down.correct  { animation-name:popInDown; }
.choice-left.correct  { animation-name:popInLeft; }
.choice-right.correct { animation-name:popInRight; }
@keyframes popInUp    { 50%{transform:scale(1.2)} 100%{transform:scale(1.06)} }
@keyframes popInDown  { 50%{transform:scale(1.2)} 100%{transform:scale(1.06)} }
@keyframes popInLeft  { 50%{transform:scale(1.2)} 100%{transform:scale(1.06)} }
@keyframes popInRight { 50%{transform:scale(1.2)} 100%{transform:scale(1.06)} }
@keyframes shake { 10%,90%{transform:translate3d(-2px,1px,0)} 20%,80%{transform:translate3d(4px,-2px,0)} 30%,50%,70%{transform:translate3d(-6px,2px,0)} 40%,60%{transform:translate3d(6px,-1px,0)} }
@keyframes glow  { from{box-shadow:0 0 0 0 rgba(43,196,138,0.5)} to{box-shadow:0 0 0 8px rgba(43,196,138,0)} }
.vocab-app.shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97); }
.edge-flash { position:absolute; inset:0; pointer-events:none; z-index:5; transition:box-shadow 0.5s; }
.edge-flash.ok { box-shadow: inset 0 0 60px 10px rgba(43,255,160,0.45); }
.edge-flash.ng { box-shadow: inset 0 0 60px 10px rgba(255,60,100,0.55); }
.particles { position:absolute; inset:0; pointer-events:none; z-index:9; }
.judge-layer { position:absolute; inset:0; pointer-events:none; z-index:10; display:grid; place-items:center; }
.judge {
  font-family: 'Bungee', sans-serif;
  font-size: 56px; line-height:1; letter-spacing:0.02em;
  text-align:center;
  transform: scale(0.5); opacity:0;
  animation: judgePop 0.95s cubic-bezier(.2,.9,.3,1.5) forwards;
  -webkit-text-stroke: 2px rgba(0,0,0,0.4);
  text-shadow: 0 6px 24px rgba(0,0,0,0.6);
}
.judge.good         { background:linear-gradient(180deg,#B8FFD0 0%,#5BE3A8 50%,#2BC48A 100%); -webkit-background-clip:text; background-clip:text; color:transparent; -webkit-text-stroke:2px #042818; }
.judge.nice         { background:linear-gradient(180deg,#FFF0A0 0%,#FFD066 50%,#FFB547 100%); -webkit-background-clip:text; background-clip:text; color:transparent; -webkit-text-stroke:2px #2a1a05; }
.judge.fire         { background:linear-gradient(180deg,#FFD66B 0%,#FF5B8A 100%); -webkit-background-clip:text; background-clip:text; color:transparent; -webkit-text-stroke:2px #2a0610; }
.judge.unstoppable  { background:linear-gradient(180deg,#7FE9FF 0%,#FF3C8C 50%,#7C5CFF 100%); -webkit-background-clip:text; background-clip:text; color:transparent; -webkit-text-stroke:2px #06121a; font-size:40px; }
.judge.miss         { background:linear-gradient(180deg,#FFC0CC 0%,#FF7AA0 50%,#FF3C6A 100%); -webkit-background-clip:text; background-clip:text; color:transparent; -webkit-text-stroke:2px #2a0610; }
@keyframes judgePop {
  0%   { transform: scale(0.3) translateY(20px); opacity:0; }
  20%  { transform: scale(1.25) translateY(0);   opacity:1; }
  35%  { transform: scale(0.95); }
  50%  { transform: scale(1); }
  80%  { transform: scale(1) translateY(-8px);   opacity:1; }
  100% { transform: scale(1.15) translateY(-40px); opacity:0; }
}

.variant-pop .choice { border:2.5px solid #111; box-shadow:4px 4px 0 #111; border-radius:20px; }
.variant-pop .choice.aim { box-shadow:2px 2px 0 #111; }
.variant-pop .choice-up.aim    { transform:scale(1.04); }
.variant-pop .choice-down.aim  { transform:scale(1.04); }
.variant-pop .choice-left.aim  { transform:scale(1.04); }
.variant-pop .choice-right.aim { transform:scale(1.04); }

.variant-neo .choice { background:rgba(255,255,255,0.06); color:#fff; border:1px solid rgba(255,255,255,0.14); backdrop-filter:blur(18px); -webkit-backdrop-filter:blur(18px); box-shadow:0 6px 24px rgba(0,0,0,0.35); }

/* ── Word card ── */
.word-card {
  grid-area:card;
  position:relative; width:min(50vw,240px); aspect-ratio:1/1; border-radius:32px;
  display:grid; place-items:center; padding:20px; cursor:grab; touch-action:none;
  text-align:center; transition:background 0.15s ease;
}
.card-word { font-size:clamp(24px,6.5vw,40px); font-weight:900; letter-spacing:-0.03em; line-height:1.15; word-break:break-word; overflow-wrap:anywhere; hyphens:none; max-width:100%; padding:0 12px; font-family:'M PLUS Rounded 1c','Hiragino Maru Gothic ProN',sans-serif; }
.card-hint { position:absolute; bottom:18px; left:0; right:0; font-family:'Space Grotesk',sans-serif; font-size:10px; letter-spacing:0.2em; text-transform:uppercase; opacity:0.35; font-weight:700; }

.word-card-bubble { background:rgba(255,255,255,0.55); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px); border:1px solid rgba(255,255,255,0.7); }
.word-card-pop { background:rgba(255,255,255,0.6); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); border:3px solid #111; box-shadow:8px 8px 0 #111; border-radius:28px; }

.word-card-neo .card-word { background:linear-gradient(180deg,#fff 0%,#C9B8FF 100%); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
.card-dots { position:absolute; inset:16px; pointer-events:none; }

.card-dots span:nth-child(1){top:8%;left:10%} .card-dots span:nth-child(2){top:14%;right:12%;background:#FF7FA6}
.card-dots span:nth-child(3){bottom:20%;left:8%;background:#7FE9FF} .card-dots span:nth-child(4){bottom:12%;right:18%}
.card-dots span:nth-child(5){top:30%;left:6%} .card-dots span:nth-child(6){top:55%;right:8%;background:#FFD66B}
.card-dots span:nth-child(7){bottom:30%;right:6%} .card-dots span:nth-child(8){top:8%;right:36%}
.card-dots span:nth-child(9){bottom:8%;left:32%} .card-dots span:nth-child(10){top:46%;left:4%}
.card-dots span:nth-child(11){bottom:50%;right:4%} .card-dots span:nth-child(12){top:20%;left:44%}

.word-card-modern { background:rgba(255,255,255,0.72) !important; backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px); border:1px solid #111; border-radius:0; box-shadow:0 20px 40px rgba(0,0,0,0.08); }
.word-card-modern::before { content:''; position:absolute; top:14px; left:14px; right:14px; height:1px; background:#111; opacity:0.3; }

.word-card-ghibli { border:1px solid rgba(74,157,184,0.2); box-shadow:0 8px 32px rgba(74,157,184,0.15),0 2px 8px rgba(0,0,0,0.06); }
.word-card-ghibli .card-word { font-family:'Fraunces','Noto Serif JP',serif; font-weight:600; color:#2C4156; }

.word-card-art { border:3px solid #1D1D1B; border-radius:0; box-shadow:6px 6px 0 #E63946; }
.word-card-art .card-word { font-family:'Space Grotesk',sans-serif; font-weight:800; letter-spacing:-0.04em; }

.word-card-wafu { border:1px solid rgba(166,38,57,0.3); border-radius:2px; box-shadow:0 2px 0 rgba(166,38,57,0.15),0 20px 50px rgba(28,24,20,0.1); }
.word-card-wafu::before { content:''; position:absolute; top:14px; left:50%; transform:translateX(-50%); width:24px; height:2px; background:#A62639; }
.word-card-wafu::after  { content:''; position:absolute; bottom:14px; left:50%; transform:translateX(-50%); width:24px; height:2px; background:#A62639; }
.word-card-wafu .card-word { font-family:'Noto Serif JP','Fraunces',serif; font-weight:700; color:#1C1814; letter-spacing:0.02em; }
.word-card-wafu .card-hint { font-family:'Noto Serif JP',serif; color:#A62639; letter-spacing:0.3em; opacity:0.55; }

/* ── Combo burst ── */
.combo-burst {
  position:absolute; left:50%; top:68%; transform:translate(-50%,-50%); z-index:15; pointer-events:none;
  display:flex; flex-direction:column; align-items:center; gap:4px;
  animation:comboBurst 0.32s cubic-bezier(.2,.9,.3,1.4);
  font-family:'Space Grotesk',sans-serif; text-shadow:0 4px 24px rgba(0,0,0,0.18);
  transform-origin:center center; will-change:transform,opacity;
}
.combo-burst.flying { animation:none; transition:transform 0.32s cubic-bezier(.5,.05,.3,1),opacity 0.32s ease 0.12s; }
.combo-burst-num { font-size:clamp(120px,28vw,180px); font-weight:800; line-height:0.88; letter-spacing:-0.05em; color:#fff; -webkit-text-stroke:3px #111; }
.combo-burst-label { font-size:18px; font-weight:800; letter-spacing:0.16em; color:#111; background:#fff; padding:4px 14px; border-radius:999px; margin-top:-4px; }
.combo-burst-start .combo-burst-num { color:#2BC48A; -webkit-text-stroke:0; }
.combo-burst-start .combo-burst-label { background:#2BC48A; color:#fff; }
.combo-burst-warm .combo-burst-num { color:#FFB547; }
.combo-burst-warm .combo-burst-label { background:#FFB547; }
.combo-burst-hot .combo-burst-num { background:linear-gradient(180deg,#FFD66B,#FF5B8A); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; -webkit-text-stroke:0; }
.combo-burst-hot .combo-burst-label { background:#FF5B8A; color:#fff; }
.combo-burst-mega .combo-burst-num { background:linear-gradient(180deg,#7FE9FF,#FF3C8C 50%,#7C5CFF); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; -webkit-text-stroke:0; animation:megaPulse 0.4s ease infinite alternate; }
.combo-burst-mega .combo-burst-label { background:linear-gradient(90deg,#FF3C8C,#7C5CFF); color:#fff; }
.variant-neo .combo-burst-num { -webkit-text-stroke:0; }
@keyframes comboBurst { 0%{transform:translate(-50%,-50%) scale(0.4);opacity:0} 60%{transform:translate(-50%,-50%) scale(1.15);opacity:1} 100%{transform:translate(-50%,-50%) scale(1);opacity:1} }

@keyframes megaPulse { from{filter:drop-shadow(0 0 0 rgba(255,60,140,0.5))} to{filter:drop-shadow(0 0 16px rgba(255,60,140,0.8))} }

/* ── Retry card ── */
.word-card.retry-card { background:linear-gradient(160deg,#FF6B9D 0%,#FF3C8C 60%,#E91E63 100%) !important; color:#fff !important; border:none !important; box-shadow:0 10px 30px rgba(233,30,99,0.35),0 28px 64px rgba(233,30,99,0.25),inset 0 1px 0 rgba(255,255,255,0.25) !important; animation:retryPulse 0.32s cubic-bezier(.2,.9,.3,1.3); display:flex !important; flex-direction:column; align-items:stretch; justify-content:center; overflow:hidden; padding:12px 0 0 !important; }
.word-card.retry-card .card-word { font-size:clamp(24px,6.5vw,40px); -webkit-text-fill-color:initial !important; color:#fff !important; background:none !important; -webkit-background-clip:initial !important; margin-bottom:6px; text-shadow:0 2px 8px rgba(0,0,0,0.15); flex-shrink:0; padding:0 14px; }
.word-card.retry-card .card-translation { font-family:'Plus Jakarta Sans',sans-serif; font-size:15px; font-weight:700; color:#fff; background:rgba(255,255,255,0.22); padding:8px 18px; border-radius:4px; backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); border:1px solid rgba(255,255,255,0.35); letter-spacing:-0.01em; margin:0 14px; }
.card-translation-img { flex:1; min-height:0; width:100%; object-fit:contain; border-radius:0 0 28px 28px; display:block; background:rgba(255,255,255,0.13); padding:4px 4px 8px; box-sizing:border-box; user-select:none; -webkit-user-select:none; pointer-events:none; }
@keyframes retryPulse { 0%{transform:scale(0.92)} 60%{transform:scale(1.03)} 100%{transform:scale(1)} }

.reveal-banner { position:absolute; left:50%; bottom:120px; transform:translateX(-50%); z-index:10; background:#111; color:#fff; padding:12px 22px; border-radius:999px; font-weight:700; font-size:14px; box-shadow:0 10px 30px rgba(0,0,0,0.25); animation:slideUp 0.3s ease; display:flex; align-items:center; gap:10px; white-space:nowrap; }
.retry-score { display:flex; gap:10px; justify-content:center; margin-top:10px; }
.sound-toggle-inline { background:rgba(0,0,0,0.08); border:none; border-radius:999px; width:34px; height:34px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:16px; cursor:pointer; backdrop-filter:blur(8px); transition:background 0.15s; -webkit-tap-highlight-color:transparent; }
.sound-toggle-inline:active { background:rgba(0,0,0,0.18); }
.variant-neo .sound-toggle-inline, .variant-cool .sound-toggle-inline { background:rgba(255,255,255,0.1); }
.variant-neo .sound-toggle-inline:active, .variant-cool .sound-toggle-inline:active { background:rgba(255,255,255,0.2); }
.retry-score-item { background:rgba(255,255,255,0.22); border:1px solid rgba(255,255,255,0.35); border-radius:999px; padding:4px 12px; font-size:12px; font-weight:800; display:flex; align-items:center; gap:4px; white-space:nowrap; color:#fff; }
.retry-score-item.ok { color:#a0ffd0; }
.retry-score-item.ng { color:#ffc0d0; }
.reveal-banner strong { color:#FF5B8A; font-size:15px; letter-spacing:0.02em; }
.variant-pop .reveal-banner { background:#FF5B8A; color:#fff; border:2.5px solid #111; box-shadow:4px 4px 0 #111; border-radius:18px; }
.variant-pop .reveal-banner strong { color:#FFEC5C; }
.variant-neo .reveal-banner { background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.15); backdrop-filter:blur(18px); }
@keyframes slideUp { from{transform:translateX(-50%) translateY(10px);opacity:0} to{transform:translateX(-50%) translateY(0);opacity:1} }

/* ── Difficulty switcher ── */
.diff-switch { position:relative; z-index:4; display:inline-flex; gap:4px; padding:3px; background:rgba(0,0,0,0.05); border-radius:999px; backdrop-filter:blur(10px); align-self:flex-start; margin:14px 18px 0; }
.variant-neo .diff-switch { background:rgba(255,255,255,0.08); }
.variant-pop .diff-switch { background:#fff; border:2px solid #111; padding:2px; }
.variant-cool .diff-switch { background:rgba(0,212,255,0.08); border:1px solid rgba(0,212,255,0.2); }
.variant-modern .diff-switch { background:#fff; border:1px solid #111; border-radius:0; }
.variant-zen .diff-switch { background:rgba(253,248,240,0.8); border:1px solid rgba(43,37,32,0.15); }
.variant-art .diff-switch { background:#fff; border:2px solid #1D1D1B; border-radius:0; }
.variant-wafu .diff-switch { background:rgba(246,238,225,0.9); border:1px solid rgba(166,38,57,0.2); border-radius:2px; }
.diff-btn { border:none; background:transparent; font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:11px; letter-spacing:0.08em; text-transform:uppercase; padding:4px 10px; border-radius:999px; cursor:pointer; color:inherit; opacity:0.55; transition:all 0.2s; }
.diff-btn.active { background:#111; color:#fff; opacity:1; }
.variant-neo .diff-btn.active { background:#fff; color:#111; }
.variant-cool .diff-btn { color:#E6F2FF; } .variant-cool .diff-btn.active { background:#00D4FF; color:#0A1628; }
.variant-modern .diff-btn.active { background:#111; color:#fff; border-radius:0; }
.variant-zen .diff-btn { color:#2B2520; } .variant-zen .diff-btn.active { background:#C15B3C; color:#F8F1E4; }
.variant-art .diff-btn.active { background:#1D3557; color:#fff; border-radius:0; }
.variant-wafu .diff-btn { color:#1C1814; border-radius:2px; } .variant-wafu .diff-btn.active { background:#A62639; color:#F6EEE1; }
.variant-ghibli .diff-btn.active { background:#4A9DB8; color:#fff; }

/* ── End screen ── */
.end-screen { position:absolute; inset:0; z-index:20; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px; padding:40px; text-align:center; background:inherit; backdrop-filter:blur(8px); }
.end-screen h1 { font-size:44px; font-weight:800; margin:0; letter-spacing:-0.03em; }
.end-screen .end-stats { display:flex; gap:20px; }
.end-stat { display:flex; flex-direction:column; }
.end-stat-num { font-family:'Space Grotesk',sans-serif; font-weight:800; font-size:32px; letter-spacing:-0.02em; }
.end-stat-label { font-size:11px; letter-spacing:0.15em; text-transform:uppercase; opacity:0.55; font-weight:700; }
.end-btn { margin-top:10px; border:none; padding:14px 28px; font-family:inherit; font-weight:800; font-size:15px; border-radius:999px; cursor:pointer; background:#111; color:#fff; letter-spacing:0.02em; }
.variant-pop .end-btn { border:2.5px solid #111; box-shadow:4px 4px 0 #111; background:#FFEC5C; color:#111; }
.variant-neo .end-btn { background:linear-gradient(135deg,#FF3C8C,#7C5CFF); }

/* ── Memory Mode ── */
.memory-mode { position:absolute; inset:0; z-index:20; display:flex; flex-direction:column; padding:calc(env(safe-area-inset-top,0px) + 20px) 16px calc(env(safe-area-inset-bottom,0px) + 16px); background:inherit; overflow-y:auto; }
.memory-list-card { background:#fff; border:3px solid #111; border-radius:22px; box-shadow:5px 5px 0 #111; padding:0 18px; margin-bottom:14px; }
.memory-list-title { display:flex; align-items:center; gap:10px; padding:16px 0 12px; font-size:17px; font-weight:900; letter-spacing:-0.02em; color:#111; border-bottom:2px solid #111; font-family:'M PLUS Rounded 1c','Hiragino Maru Gothic ProN',sans-serif; }
.memory-list-badge { background:#FF5B8A; color:#fff; font-size:12px; font-weight:900; padding:3px 10px; border-radius:999px; font-family:'M PLUS Rounded 1c',sans-serif; }
.memory-list { display:flex; flex-direction:column; }
.memory-item { display:flex; justify-content:space-between; align-items:center; padding:13px 0; gap:12px; border-bottom:1.5px dashed rgba(0,0,0,0.15); }
.memory-item:last-child { border-bottom:none; }
.memory-word { font-family:'M PLUS Rounded 1c','Hiragino Maru Gothic ProN',sans-serif; font-weight:900; font-size:20px; color:#111; letter-spacing:-0.02em; flex-shrink:0; }
.memory-correct { font-size:13px; font-weight:700; color:#555; text-align:right; }
.memory-footer { display:flex; justify-content:center; align-items:center; }
.memory-btn { border:3px solid #111; padding:14px 44px; font-family:'M PLUS Rounded 1c','Hiragino Maru Gothic ProN',sans-serif; font-weight:900; font-size:15px; border-radius:999px; cursor:pointer; background:#111; color:#FFE94B; box-shadow:4px 4px 0 #FF3C8C; transition:transform 0.12s, box-shadow 0.12s; -webkit-tap-highlight-color:transparent; }
.memory-btn:active { transform:translate(3px,3px); box-shadow:1px 1px 0 #FF3C8C; }
.memory-heading { font-family:'M PLUS Rounded 1c','Hiragino Maru Gothic ProN',sans-serif; font-weight:900; font-size:clamp(36px,10vw,54px); color:#111; letter-spacing:-0.04em; line-height:1; }
.memory-heading-wrap { text-align:center; margin-bottom:16px; }

/* ── Confirm Mode header ── */
.confirm-header { position:relative; z-index:30; align-self:center; background:rgba(43,196,138,0.15); border:1px solid rgba(43,196,138,0.35); color:#2BC48A; font-size:11px; font-weight:800; letter-spacing:0.14em; text-transform:uppercase; padding:4px 14px; border-radius:999px; white-space:nowrap; margin-top:6px; }

/* ── Result Screen ── */
.result-screen { position:absolute; inset:0; z-index:20; display:flex; flex-direction:column; align-items:center; padding:calc(env(safe-area-inset-top,0px) + 20px) 16px calc(env(safe-area-inset-bottom,0px) + 20px); background:transparent; overflow-y:auto; gap:0; }
.result-heading-wrap { display:flex; align-items:center; justify-content:center; gap:6px; margin-bottom:4px; }
.result-emoji { font-size:clamp(26px,7vw,36px); line-height:1; }
.result-heading { font-family:'M PLUS Rounded 1c','Hiragino Maru Gothic ProN',sans-serif; font-weight:900; font-size:clamp(38px,10.5vw,56px); color:#111; letter-spacing:-0.04em; line-height:1; }
.result-sub { font-size:12px; font-weight:700; color:#555; letter-spacing:0.05em; margin-bottom:18px; text-align:center; font-family:'M PLUS Rounded 1c','Hiragino Maru Gothic ProN',sans-serif; }
.result-stats-card { width:100%; background:#fff; border:3px solid #111; border-radius:22px; box-shadow:5px 5px 0 #111; padding:20px 16px 16px; display:flex; flex-direction:column; align-items:center; margin-bottom:16px; }
.result-acc-pct { font-family:'M PLUS Rounded 1c','Hiragino Maru Gothic ProN',sans-serif; font-size:clamp(58px,16vw,80px); font-weight:900; color:#FF5B8A; letter-spacing:-0.04em; line-height:1; }
.result-acc-unit { font-size:0.55em; }
.result-acc-label { font-size:10px; font-weight:800; letter-spacing:0.2em; color:#888; text-transform:uppercase; margin-bottom:14px; }
.result-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; width:100%; }
.result-stat { background:#FFFBE6; border:1.5px solid rgba(0,0,0,0.08); border-radius:12px; padding:11px 12px; }
.result-stat-label { font-size:11px; font-weight:700; color:#888; margin-bottom:3px; font-family:'M PLUS Rounded 1c',sans-serif; }
.result-stat-num { font-size:24px; font-weight:900; color:#111; font-family:'M PLUS Rounded 1c',sans-serif; }
.result-stat.ok .result-stat-num { color:#2BC48A; }
.result-stat.ng .result-stat-num { color:#FF5B8A; }
.result-none { padding:24px 0; text-align:center; opacity:0.45; font-size:14px; font-weight:700; font-family:'M PLUS Rounded 1c',sans-serif; }
.result-footer { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; margin-top:4px; }
.result-vocab-card { width:100%; background:#fff; border:3px solid #111; border-radius:22px; box-shadow:5px 5px 0 #111; padding:16px 18px; margin-bottom:16px; }
.result-vocab-name { font-family:'M PLUS Rounded 1c','Hiragino Maru Gothic ProN',sans-serif; font-weight:900; font-size:15px; color:#111; letter-spacing:-0.01em; margin-bottom:12px; border-bottom:2px solid #111; padding-bottom:10px; }
.result-vocab-rows { display:flex; flex-direction:column; gap:6px; margin-bottom:14px; }
.result-vocab-row { display:flex; justify-content:space-between; align-items:center; font-family:'M PLUS Rounded 1c',sans-serif; }
.result-vocab-row-label { font-size:13px; font-weight:700; color:#555; }
.result-vocab-row-val { font-size:16px; font-weight:900; color:#111; }
.result-vocab-row-val.ok { color:#2BC48A; }
.result-vocab-row-val.ng { color:#FF5B8A; }
.result-vocab-bar { width:100%; height:14px; border-radius:999px; overflow:hidden; display:flex; background:#E0E0E0; }
.result-vocab-bar-seg { height:100%; transition:width 0.6s ease; }
.result-vocab-bar-seg.ok { background:#2BC48A; }
.result-vocab-bar-seg.ng { background:#FF5B8A; }
.result-vocab-bar-seg.un { background:#D0D0D0; }

/* ── Title Mode ── */
.title-screen {
  position:relative; z-index:1;
  width:100%; height:100%;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:24px 20px calc(28px + env(safe-area-inset-bottom,0px));
  text-align:center; overflow:hidden;
}
/* ドットパターン背景 */
.title-screen::before {
  content:''; position:absolute; inset:0;
  background-image:radial-gradient(rgba(0,0,0,0.12) 1.5px, transparent 1.5px);
  background-size:18px 18px;
  pointer-events:none; z-index:0;
}
.title-screen > * { position:relative; z-index:1; }

.title-badge {
  display:inline-block;
  background:#111; color:#FFE94B;
  font-weight:900; font-size:11px; letter-spacing:4px; text-transform:uppercase;
  padding:6px 16px; border-radius:999px; border:2.5px solid #111;
  margin-bottom:16px;
  font-family:'M PLUS Rounded 1c','Hiragino Maru Gothic ProN',sans-serif;
}
.title-h1 {
  font-size:clamp(48px,13vw,80px); font-weight:900; letter-spacing:-3px;
  line-height:0.92; margin:0 0 8px; color:#111;
  font-family:'M PLUS Rounded 1c','Hiragino Maru Gothic ProN',sans-serif;
}
.title-h1 .title-accent { color:#FF5B8A; }
.title-tagline {
  font-size:13px; font-weight:700; opacity:0.5; margin-bottom:22px; letter-spacing:0.02em;
  font-family:'M PLUS Rounded 1c','Hiragino Maru Gothic ProN',sans-serif;
}
.title-preview-card {
  width:min(56vw,210px); aspect-ratio:1/1;
  background:#fff;
  border:3px solid #111; border-radius:28px;
  box-shadow:8px 10px 0 #111;
  display:grid; place-items:center;
  margin-bottom:26px;
  transform:rotate(-3deg);
  animation:titleCardIn 0.45s cubic-bezier(.2,.9,.3,1.3);
}
@keyframes titleCardIn { 0%{opacity:0;transform:rotate(-3deg) scale(0.82)} 100%{opacity:1;transform:rotate(-3deg) scale(1)} }
/* カード内の単語（カードは動かず文字だけフェード） */
.title-preview-word {
  font-size:clamp(28px,7vw,44px); font-weight:900; letter-spacing:-1px; color:#111;
  font-family:'M PLUS Rounded 1c','Hiragino Maru Gothic ProN',sans-serif;
  animation:wordFadeIn 0.35s ease;
  padding:0 10px; text-align:center; word-break:break-word;
}
@keyframes wordFadeIn { 0%{opacity:0;transform:translateY(6px)} 100%{opacity:1;transform:translateY(0)} }

/* はじめるボタン 3つ */
.title-start-row {
  display:flex; gap:10px; justify-content:center; margin-bottom:22px; flex-wrap:wrap;
}
.title-start-btn {
  display:flex; flex-direction:column; align-items:center; gap:3px;
  background:#111; color:#fff;
  border:3px solid #111; border-radius:22px;
  padding:14px 18px; min-width:86px;
  font-family:'M PLUS Rounded 1c','Hiragino Maru Gothic ProN',sans-serif; cursor:pointer;
  box-shadow:5px 5px 0 #FF5B8A;
  transition:transform 120ms ease, box-shadow 120ms ease;
  -webkit-tap-highlight-color:transparent;
}
.title-start-btn:active { transform:translate(4px,4px); box-shadow:1px 1px 0 #FF5B8A; }
.title-start-num { font-size:22px; font-weight:900; line-height:1; letter-spacing:-0.5px; white-space:nowrap; }
.title-start-q { font-size:11px; font-weight:800; letter-spacing:1px; vertical-align:bottom; margin-left:1px; opacity:0.85; }
.title-start-mon { font-size:16px; font-weight:900; }
.title-start-label { font-size:11px; font-weight:800; opacity:0.7; letter-spacing:2px; }

/* CSV選択ボタン */
.title-csv-area { width:100%; max-width:380px; }
.title-csv-btn {
  width:100%;
  background:#fff;
  border:3px solid #111; border-radius:18px;
  padding:12px 18px; cursor:pointer;
  font-family:'M PLUS Rounded 1c','Hiragino Maru Gothic ProN',sans-serif;
  display:flex; flex-direction:column; align-items:center; gap:6px;
  box-shadow:5px 5px 0 #111;
  transition:transform 0.12s, box-shadow 0.12s;
}
.title-csv-btn:active { transform:translate(3px,3px); box-shadow:2px 2px 0 #111; }
.title-csv-btn:disabled { opacity:0.6; cursor:default; }
.title-csv-row1 { display:flex; align-items:center; gap:8px; width:100%; justify-content:center; }
.title-csv-icon { font-size:15px; flex-shrink:0; }
.title-csv-name { font-size:12px; font-weight:800; word-break:break-all; text-align:center; color:#111; }
.title-csv-switch { font-size:10px; flex-shrink:0; background:#111; color:#fff; padding:3px 10px; border-radius:999px; font-weight:800; white-space:nowrap; }
.title-csv-stats { display:flex; gap:12px; align-items:center; font-size:12px; font-weight:800; }
.title-csv-total { color:#888; }
.title-csv-ok { color:#2BC48A; }
.title-csv-ng { color:#FF5B8A; }

/* ── SW update bar ── */
.sw-update-bar { position:fixed; top:0; left:0; right:0; z-index:9999; display:flex; align-items:center; justify-content:center; gap:12px; padding:10px 16px; background:#111; color:#FFE94B; font-family:'M PLUS Rounded 1c','Hiragino Maru Gothic ProN',sans-serif; font-size:13px; font-weight:700; box-shadow:0 2px 12px rgba(0,0,0,0.3); }
.sw-update-btn { border:2px solid #FFE94B; background:transparent; color:#FFE94B; font-family:inherit; font-size:12px; font-weight:800; padding:4px 14px; border-radius:999px; cursor:pointer; letter-spacing:0.04em; white-space:nowrap; }

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').then(reg => {
    window.__swReg = reg;

    const notifyUpdate = () => {
      if (window.__swUpdateCallback) window.__swUpdateCallback();
    };

    // 既にwaiting中のSWがあれば即通知
    if (reg.waiting) notifyUpdate();

    reg.addEventListener('updatefound', () => {
      const newWorker = reg.installing;
      if (!newWorker) return;
      newWorker.addEventListener('statechange', () => {
        if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
          notifyUpdate();
        }
      });
    });
  }).catch(() => {});
}

// 再読み込み: 新SWにskipWaitingを送り、制御移行後にナビゲート
window.__swReload = () => {
  const reg = window.__swReg;
  const doNav = () => window.location.replace(window.location.pathname);
  if (reg && reg.waiting) {
    navigator.serviceWorker.addEventListener('controllerchange', doNav, { once: true });
    reg.waiting.postMessage('skipWaiting');
  } else {
    doNav();
  }
};
</script>

// ── Bottom Dock components ──
function AccSparkline({ history, total, accent }) {
  const points = React.useMemo(() => {
    let c = 0;
    return history.map((h, i) => { if (h.ok) c++; return c / (i + 1); });
  }, [history]);

  const W = 200, H = 64, PAD = 6;
  const n = Math.max(total, 2);
  const xAt = (i) => PAD + (i / (n - 1)) * (W - PAD * 2);
  const yAt = (v) => PAD + (1 - v) * (H - PAD * 2);

  const path = points.length === 0 ? '' :
    points.map((v, i) => `${i === 0 ? 'M' : 'L'} ${xAt(i).toFixed(1)} ${yAt(v).toFixed(1)}`).join(' ');
  const fillPath = points.length === 0 ? '' :
    `${path} L ${xAt(points.length - 1).toFixed(1)} ${H - PAD} L ${xAt(0).toFixed(1)} ${H - PAD} Z`;

  return (
    <div className="dock-graph">
      <svg viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none">
        <defs>
          <linearGradient id="dockSparkFill" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor={accent} stopOpacity="0.35"/>
            <stop offset="100%" stopColor={accent} stopOpacity="0.00"/>
          </linearGradient>
        </defs>
        <line x1={PAD} x2={W - PAD} y1={yAt(0.5)} y2={yAt(0.5)} stroke="currentColor" strokeOpacity="0.12" strokeDasharray="2 3"/>
        <line x1={PAD} x2={W - PAD} y1={yAt(0.8)} y2={yAt(0.8)} stroke="#2BC48A" strokeOpacity="0.35" strokeDasharray="2 3"/>
        {points.length > 0 && <path d={fillPath} fill="url(#dockSparkFill)"/>}
        {points.length > 0 && <path d={path} fill="none" stroke={accent} strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round"/>}
        {points.map((v, i) => (
          <circle key={i} cx={xAt(i)} cy={yAt(v)} r={i === points.length - 1 ? 3.6 : 2.2}
            fill={history[i].ok ? '#2BC48A' : '#FF5B8A'}
            stroke="#fff" strokeWidth={i === points.length - 1 ? 2 : 1.2}>
            {i === points.length - 1 && (
              <animate attributeName="r" values="3.6;5;3.6" dur="1.4s" repeatCount="indefinite"/>
            )}
          </circle>
        ))}
      </svg>
    </div>
  );
}

function DotTrail({ history, total }) {
  const cells = Array.from({ length: total }, (_, i) => history[i]);
  return (
    <div className="dt-wrap">
      {cells.map((h, i) => {
        const cls = !h ? '' : (h.ok ? 'ok' : 'ng');
        const isCur = i === history.length;
        const justEntered = h && i === history.length - 1;
        const heightPct = h ? (h.ok ? '85%' : '55%') : '35%';
        return (
          <div key={i} className={`dt-cell ${cls} ${isCur ? 'cur' : ''} ${justEntered ? 'entered' : ''}`}
            style={{ height: heightPct }} />
        );
      })}
    </div>
  );
}

function SpeedBars({ history, total, avgSec }) {
  const cells = Array.from({ length: total }, (_, i) => history[i]);
  const maxSec = Math.max(10, ...history.map(h => h?.sec || 0));
  const avgPct = avgSec > 0 ? Math.min(100, (avgSec / maxSec) * 100) : 0;
  return (
    <>
      <div className="sb-wrap">
        {cells.map((h, i) => {
          if (!h) return <div key={i} className="sb-cell empty" style={{ height: '16%' }} />;
          const pct = Math.min(100, (h.sec / maxSec) * 100);
          const isLast = i === history.length - 1;
          return (
            <div key={i} className={`sb-cell ${h.ok ? 'ok' : 'ng'} ${isLast ? 'entered' : ''}`}
              style={{ height: `${Math.max(10, pct)}%` }} />
          );
        })}
      </div>
      {history.length > 0 && (
        <div className="sb-avg" style={{ bottom: `calc(${avgPct}% + 2px)` }}>
          <span className="sb-avg-tag">AVG {avgSec.toFixed(1)}s</span>
        </div>
      )}
    </>
  );
}

function BottomDock({ history, total, accent, accent2, flash, variant }) {
  const answered = history.length;
  const correctCnt = history.filter(h => h.ok).length;
  const accPct = answered > 0 ? Math.round((correctCnt / answered) * 100) : 0;
  const accClass = answered > 0
    ? (accPct >= 80 ? 'acc-good' : accPct >= 50 ? 'acc-mid' : 'acc-bad')
    : '';
  const totalSec = history.reduce((s, h) => s + h.sec, 0);
  const avgSec = answered > 0 ? totalSec / answered : 0;
  let streak = 0;
  for (let i = history.length - 1; i >= 0; i--) { if (history[i].ok) streak++; else break; }
  const isBumping = flash === 'ok' || flash === 'ng';

  return (
    <div className="bottom-dock" style={{ '--accent': accent, '--accent2': accent2 }}>
      <div className={`dock-flash ${flash}`} />
      {/* 左: 正答率 */}
      <div className="dock-row">
        <AccSparkline history={history} total={total} accent={accent} />
        <div className="dock-stat">
          <div className="dock-stat-left">

              <svg viewBox="0 0 16 16" width="11" height="11" fill="none" stroke="currentColor" strokeWidth="1.7">

              </svg>
            </span>
            <span className="dock-stat-jp">正答率</span>
            <div className="dock-stat-val">
              <span className={`dock-stat-num ${accClass} ${isBumping ? 'bump' : ''}`} key={`acc-${answered}`}>{accPct}</span>
              <span className="dock-stat-unit">%</span>
            </div>
          </div>
          {streak >= 3 && <span className="dock-badge">🔥 {streak}連続</span>}
        </div>
      </div>
      {/* 右: 平均解答時間 */}
      <div className="dock-row">
        <div className="dock-graph">
          <SpeedBars history={history} total={total} avgSec={avgSec} />

          <div className="dock-stat-left">

              <svg viewBox="0 0 16 16" width="11" height="11" fill="none" stroke="currentColor" strokeWidth="1.7">
                <circle cx="8" cy="8" r="6"/><path d="M8 4.5V8l2.4 1.5" strokeLinecap="round"/>
              </svg>
            </span>
            <span className="dock-stat-jp">解答時間</span>
            <div className="dock-stat-val">
              <span className={`dock-stat-num ${isBumping ? 'bump' : ''}`} key={`spd-${answered}`}>{avgSec > 0 ? avgSec.toFixed(1) : '0.0'}</span>
              <span className="dock-stat-unit">秒/問</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

function AccuracyRing({ pct, color }) {
  const R = 22, C = 2 * Math.PI * R;
  const off = C - (pct / 100) * C;
  return (
    <div className="ms-ring">
      <svg viewBox="0 0 56 56">
        <circle className="ring-bg" cx="28" cy="28" r={R}/>

          stroke={color} strokeDasharray={C} strokeDashoffset={off}/>

}

// ── SpeedGauge ──
function SpeedGauge({ sec, color, emoji }) {
  const v = sec <= 0 ? 0 : Math.max(0, Math.min(1, (8 - sec) / (8 - 1.5)));
  const R = 22;
  const arcLen = Math.PI * R;
  const filled = arcLen * v;
  const angle = -90 + v * 180;
  return (
    <div className="ms-gauge">
      <svg viewBox="0 0 56 56">
        <path className="gauge-bg" d={`M 6 32 A ${R} ${R} 0 0 1 50 32`}/>
        <path className="gauge-fg"
          d={`M 6 32 A ${R} ${R} 0 0 1 50 32`}
          stroke={color}
          strokeDasharray={`${filled} ${arcLen}`}
        />
        {sec > 0 && (
          <g className="gauge-needle" style={{ transform: `rotate(${angle}deg)` }}>
            <line x1="28" y1="32" x2="28" y2="14" stroke={color} strokeWidth="2" strokeLinecap="round"/>
            <circle cx="28" cy="32" r="2.5" fill={color}/>
          </g>
        )}
      </svg>
      <div className="gauge-emoji">{emoji}</div>
    </div>
  );
}

// ── ComboBurst ──
function ComboBurst({ combo, active }) {
  const ref = React.useRef(null);
  const [state, setState] = React.useState('hidden');
  const [transform, setTransform] = React.useState('');
  const prevActive = React.useRef(false);
  React.useEffect(() => {
    let t;
    if (active && !prevActive.current) {
      setState('center'); setTransform('');
    } else if (!active && prevActive.current) {
      const el = ref.current;
      const numEl = el?.querySelector('.combo-burst-num');
      const target = document.getElementById('combo-target-num');
      if (el && numEl && target) {
        const er = numEl.getBoundingClientRect(), tr = target.getBoundingClientRect();
        const dx = (tr.left + tr.width/2) - (er.left + er.width/2);
        const dy = (tr.top + tr.height/2) - (er.top + er.height/2);
        const scale = tr.height / er.height;
        setTransform(`translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px)) scale(${scale})`);
        setState('flying');
        t = setTimeout(() => setState('hidden'), 360);
      } else { setState('hidden'); }
    }
    prevActive.current = active;
    return () => clearTimeout(t);
  }, [active]);
  if (state === 'hidden') return null;
  const tier = combo >= 10 ? 'mega' : combo >= 5 ? 'hot' : combo >= 3 ? 'warm' : 'start';
  const label = combo >= 10 ? 'UNSTOPPABLE' : combo >= 5 ? 'ON FIRE' : combo >= 3 ? 'NICE!' : 'COMBO';
  return (
    <div ref={ref} className={`combo-burst combo-burst-${tier} ${state==='flying'?'flying':''}`}
      style={state==='flying' ? {transform, opacity:0.85} : undefined}>
      <div className="combo-burst-num">{combo}</div>
      {state === 'center' && <div className="combo-burst-label">{label}</div>}
    </div>
  );
}

// ── RetryTranslation: 画像があれば表示、なければ和訳テキスト ──
function RetryTranslation({ question, csvFileName }) {
  const [imgFailed, setImgFailed] = React.useState(false);
  const [imgLoaded, setImgLoaded] = React.useState(false);
  React.useEffect(() => { setImgFailed(false); setImgLoaded(false); }, [question.word, question.correct]);

  const imgSrc = !imgFailed && question.imageFile && csvFileName
    ? 'images/' + csvFileName.replace(/\.csv$/i, '') + '/' + question.imageFile
    : null;

  if (!imgSrc) {
    return <div className="card-translation">{question.correct}</div>;
  }

  return (
    <>
      {!imgLoaded && <div className="card-translation">{question.correct}</div>}
      <img
        src={imgSrc}
        className="card-translation-img"
        style={imgLoaded ? undefined : { display:'none' }}
        alt={question.correct}
        draggable="false"
        onDragStart={e => e.preventDefault()}
        onLoad={() => setImgLoaded(true)}
        onError={() => setImgFailed(true)}
      />

  );
}

// ── SwipeCard ──
function SwipeCard({ question, onAnswer, variant, disabled, feedback, retryMode, rightDir, onPlaySound, onPlayWrong, retryScore, nextQuestion, remaining, csvFileName }) {
  const [drag, setDrag] = React.useState({ x:0, y:0, active:false });
  const [flying, setFlying] = React.useState(null);
  const [flyVec, setFlyVec] = React.useState({ x:0, y:0 });
  const startRef = React.useRef({ x:0, y:0 });
  const committedRef = React.useRef(false);  // 1問につき1回だけコミット

  React.useEffect(() => {
    setDrag({ x:0, y:0, active:false }); setFlying(null); setFlyVec({ x:0, y:0 });
    committedRef.current = false;
  }, [question?.word]);

  const commitDirection = React.useCallback((dir, vec) => {
    if (flying || disabled || committedRef.current) return;
    committedRef.current = true;
    setFlying(dir); setFlyVec(vec);
    const idx = { up:0, right:1, down:2, left:3 }[dir];
    const answer = question.choices[idx];
    // スワイプ検知の瞬間に即再生（アニメーション待ちなし）
    if (!retryMode && answer === question.correct) onPlaySound?.();
    if (!retryMode && answer !== question.correct) onPlayWrong?.();
    if (retryMode && dir === rightDir) onPlaySound?.();
    setTimeout(() => {
      onAnswer(answer, dir);
      if (retryMode && dir !== rightDir) {
        committedRef.current = false;
        setFlying(null); setFlyVec({ x:0, y:0 }); setDrag({ x:0, y:0, active:false });
      }
    }, 280);
  }, [flying, disabled, question, onAnswer, retryMode, rightDir, onPlaySound, onPlayWrong]);

  const onPointerDown = (e) => {
    if (disabled || flying) return;
    e.currentTarget.setPointerCapture?.(e.pointerId);
    startRef.current = { x: e.clientX, y: e.clientY };
    setDrag({ x:0, y:0, active:true });
  };
  const onPointerMove = (e) => {
    if (!drag.active) return;
    setDrag({ x: e.clientX - startRef.current.x, y: e.clientY - startRef.current.y, active:true });
  };
  const onPointerUp = () => {
    if (!drag.active) return;
    const { x, y } = drag;
    const ax = Math.abs(x), ay = Math.abs(y);
    setDrag({ x:0, y:0, active:false });
    if (Math.max(ax, ay) > 90) {
      const dir = ax > ay ? (x > 0 ? 'right' : 'left') : (y > 0 ? 'down' : 'up');
      const scale = 900 / Math.max(ax, ay, 1);
      commitDirection(dir, { x: x*scale, y: y*scale });
    }
  };
  const onPointerCancel = () => {
    setDrag({ x:0, y:0, active:false });
  };

  React.useEffect(() => {
    if (disabled) return;
    const onKey = (e) => {
      const map = { ArrowUp:'up', ArrowRight:'right', ArrowDown:'down', ArrowLeft:'left' };
      const dir = map[e.key]; if (!dir) return; e.preventDefault();
      const vec = { up:{x:0,y:-900}, right:{x:900,y:0}, down:{x:0,y:900}, left:{x:-900,y:0} }[dir];
      commitDirection(dir, vec);
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [commitDirection, disabled]);

  const peekOffset = 0;
  const peekOpacity = 1;
  const mainDeckShadow = (() => {
    if (!remaining || remaining <= 0) return 'none';
    // 100枚で最大12層（24px幅）になるようにスケールを調整
    const layers = Math.min(Math.ceil((remaining / 100) * 12), 12);
    // ただし、残り1枚以上の場合は最低1層は表示する
    const actualLayers = Math.max(1, layers);
    const isSolid = ['pop', 'modern', 'art'].includes(variant?.id);
    const color = isSolid ? '#111' : 'rgba(0,0,0,0.25)';
    
    return Array.from({length: actualLayers}, (_, i) => {
      const d = (i + 1) * 2; // 2pxずつずらして束を表現
      return `${d}px ${d}px 0 ${color}`;
    }).join(', ');
  })();

  const rot = flying ? flyVec.x * 0.05 : drag.x * 0.08;
  const tx = flying ? flyVec.x : drag.x;
  const ty = flying ? flyVec.y : drag.y;
  const flyScale = flying ? 0 : 1;
  const transition = flying ? 'transform 260ms cubic-bezier(.5,.0,.85,.15)'
    : drag.active ? 'none' : 'transform 280ms cubic-bezier(.2,.9,.3,1.3)';
  const aim = (() => {
    if (flying) return flying; if (!drag.active) return null;
    const { x, y } = drag; const ax = Math.abs(x), ay = Math.abs(y);
    if (Math.max(ax, ay) < 30) return null;
    return ax > ay ? (x > 0 ? 'right' : 'left') : (y > 0 ? 'down' : 'up');
  })();
  const CLICK_VECS = { up:{x:0,y:-900}, right:{x:900,y:0}, down:{x:0,y:900}, left:{x:-900,y:0} };

  return (
    <div className="swipe-stage">
      {nextQuestion && (
        <div className={`word-card word-card-${variant?.id || 'bubble'} word-card-peek`}
          style={{ background: variant?.cardBg || '#fff', color: variant?.cardFg || '#111', fontFamily: variant?.wordFont,
            transform: `translate(${peekOffset}px, ${peekOffset}px)`,
            opacity: peekOpacity, boxShadow: mainDeckShadow || 'none' }}>
          <div className="card-word" style={(() => {
            const n = nextQuestion.word?.length || 0;
            const fs = n >= 16 ? 'clamp(19px,3.8vw,20px)'
                     : n >= 13 ? 'clamp(21px,4.4vw,24px)'
                     : n >= 10 ? 'clamp(21px,5.2vw,28px)'
                     : n >= 7  ? 'clamp(23px,5.8vw,32px)'
                     : undefined;
            return fs ? { fontSize: fs } : undefined;
          })()}>{nextQuestion.word}</div>
        </div>
      )}
      {['up','right','down','left'].map((dir, i) => {
        const isAim = aim === dir;
        const isCorrect = feedback && feedback.dir === dir && feedback.correct;
        const isWrong = feedback && feedback.dir === dir && !feedback.correct;
        const isRight = feedback && feedback.rightDir === dir && !feedback.correct;
        return (
          <button key={dir}
            className={`choice choice-${dir} ${isAim?'aim':''} ${isCorrect?'correct':''} ${isWrong?'wrong':''} ${isRight?'reveal':''}`}
            onClick={() => !disabled && !flying && commitDirection(dir, CLICK_VECS[dir])}
            style={{ '--accent': variant?.accent || '#FF5B8A' }}
            disabled={disabled}>
            <span className="choice-arrow">{dir==='up'?'↑':dir==='right'?'→':dir==='down'?'↓':'←'}</span>
            <span className="choice-label">{(dir==='left'||dir==='right') ? question.choices[i].replace(/（/g,'(').replace(/）/g,')') : question.choices[i]}</span>
          </button>
        );
      })}
      <div className={`word-card word-card-${variant?.id||'bubble'} ${retryMode?'retry-card':''}`}
        style={{ transform:`translate(${tx}px,${ty}px) scale(${flyScale}) rotate(${rot}deg)`, transition, opacity: 1, zIndex: 1,
          background: retryMode ? undefined : variant?.cardBg,
          color: retryMode ? undefined : variant?.cardFg,
          fontFamily: variant?.wordFont,
          boxShadow: 'none' }}
        onPointerDown={onPointerDown} onPointerMove={onPointerMove}
        onPointerUp={onPointerUp} onPointerCancel={onPointerCancel}>
        {variant?.id === 'neo' && !retryMode && (
          <div className="card-dots">{Array.from({length:12}).map((_,i)=><span key={i}/>)}</div>
        )}
        <div className="card-word" style={(() => {
          const n = question.word?.length || 0;
          const fs = n >= 16 ? 'clamp(19px,3.8vw,20px)'
                   : n >= 13 ? 'clamp(21px,4.4vw,24px)'
                   : n >= 10 ? 'clamp(21px,5.2vw,28px)'
                   : n >= 7  ? 'clamp(23px,5.8vw,32px)'
                   : undefined;
          return fs ? { fontSize: fs } : undefined;
        })()}>{question.word}</div>
        {retryMode && <RetryTranslation question={question} csvFileName={csvFileName}/>}
        {retryMode && retryScore && !question.imageFile && (
          <div className="retry-score">
            <span className="retry-score-item ok">✓ {retryScore.correct}</span>
            <span className="retry-score-item ng">✗ {retryScore.wrong}</span>
          </div>
        )}
        {!retryMode && variant?.id !== 'neo' && <div className="card-hint">スワイプで回答</div>}
      </div>
    </div>
  );
}

// ── VocabApp ──
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}
function buildWordCorrects(data) {
  const map = new Map();
  for (const d of data) {
    if (!map.has(d.word)) map.set(d.word, new Set());
    map.get(d.word).add(d.correct);
  }
  return map;
}
function buildQuestions(data, n) {
  const correctPool = data.map(d => d.correct);
  const wordCorrects = buildWordCorrects(data);
  return shuffle(data).slice(0, n).map(d => ({
    word: d.word, correct: d.correct, imageFile: d.imageFile || '',
    choices: buildChoices(d.word, d.correct, d.wrongs || [], null, correctPool, wordCorrects.get(d.word))
  }));
}

// 訳違いの同一単語を別エントリとして扱うキー
function histKey(word, correct) { return word + '\x00' + correct; }

// Build per-(word,correct) stats from DB rows (including consecutive streak and past wrong answers)
function buildHistory(rows) {
  const wordRows = new Map();
  for (const row of rows) {
    const k = histKey(row.word, row.correct);
    if (!wordRows.has(k)) wordRows.set(k, []);
    wordRows.get(k).push(row);
  }
  const map = new Map();
  for (const [key, wRows] of wordRows) {
    let correctCount = 0, wrongCount = 0, lastWrongTime = '', lastTime = '', lastPass = null;
    const wrongAnswers = new Set();
    for (const row of wRows) {
      const t = (row.date||'')+(row.time||'');
      if (row.pass === '○') { correctCount++; } else {
        wrongCount++; if (t > lastWrongTime) lastWrongTime = t;
        if (row.userAnswer && row.userAnswer !== '(タイムアウト)') wrongAnswers.add(row.userAnswer);
      }
      if (t > lastTime) { lastTime = t; lastPass = row.pass; }
    }
    const recentPass = wRows[wRows.length - 1]?.pass;
    let streak = 0;
    for (let i = wRows.length - 1; i >= 0 && wRows[i].pass === recentPass; i--) streak++;
    map.set(key, { lastPass, lastTime, lastWrongTime, correctCount, wrongCount, streak, wrongAnswers });
  }
  return map;
}

// Build 4 choices for one question, injecting past wrong answer if wrongs < 3
function buildChoices(word, correct, csvWrongs, history, correctPool, sameWordCorrects) {
  let wrongs = [...csvWrongs];
  if (wrongs.length < 3 && history) {
    const h = history.get(histKey(word, correct));
    if (h && h.wrongAnswers.size > 0) {
      const pastW = [...h.wrongAnswers].filter(a => a !== correct && !wrongs.includes(a));
      if (pastW.length > 0) wrongs.push(pastW[0]); // 過去の誤答を1択として追加
    }
  }
  if (wrongs.length < 3) {
    const candidates = shuffle((correctPool || []).filter(c =>
      c !== correct &&
      !wrongs.includes(c) &&
      !(sameWordCorrects && sameWordCorrects.has(c)) // 同じ英単語の別義は除外
    ));
    while (wrongs.length < 3 && candidates.length > 0) wrongs.push(candidates.pop());
  }
  return shuffle([correct, ...wrongs.slice(0, 3)]);
}

// Build question list: 60% unseen, 30% recently-wrong, 10% recently-correct
function buildWeightedQuestions(data, n, history) {
  const unseen = [], recentlyWrong = [], recentlyCorrect = [];
  for (const d of data) {
    const h = history.get(histKey(d.word, d.correct));
    if (!h) { unseen.push(d); }
    else if (h.lastPass === '×') { recentlyWrong.push({ ...d, _wt: h.lastWrongTime }); }
    else { recentlyCorrect.push({ ...d, _net: h.correctCount - h.wrongCount }); }
  }
  recentlyWrong.sort((a, b) => a._wt.localeCompare(b._wt));   // oldest wrong first
  recentlyCorrect.sort((a, b) => a._net - b._net);             // lowest net-correct first

  const nW = Math.min(Math.round(n * 0.3), recentlyWrong.length);
  const nC = Math.min(Math.round(n * 0.1), recentlyCorrect.length);
  const nU = Math.min(n - nW - nC, unseen.length);

  const wPool = recentlyWrong.slice(0, nW);
  const cPool = recentlyCorrect.slice(0, nC);
  const uPool = shuffle(unseen).slice(0, nU);

  // Fill any shortfall from unused items
  const used = new Set([...wPool, ...cPool, ...uPool].map(d => d.word));
  const spare = shuffle([...recentlyWrong.slice(nW), ...recentlyCorrect.slice(nC), ...unseen.slice(nU)].filter(d => !used.has(d.word)));

  // Interleave in 6:3:1 pattern
  const pools = [uPool, wPool, cPool], ratios = [6, 3, 1], ptrs = [0, 0, 0];
  const result = [];
  while (result.length < n) {
    let added = false;
    for (let pi = 0; pi < pools.length; pi++) {
      for (let j = 0; j < ratios[pi] && ptrs[pi] < pools[pi].length && result.length < n; j++) {
        result.push(pools[pi][ptrs[pi]++]); added = true;
      }
    }
    if (!added) break;
  }
  for (const d of spare) { if (result.length >= n) break; result.push(d); }

  const correctPool = data.map(d => d.correct);
  const wordCorrects = buildWordCorrects(data);
  return result.slice(0, n).map(d => ({
    word: d.word, correct: d.correct, imageFile: d.imageFile || '',
    choices: buildChoices(d.word, d.correct, d.wrongs || [], history, correctPool, wordCorrects.get(d.word))
  }));
}

// Build confirm questions: choices come only from batch's correct answers
function buildConfirmQuestions(batch, fallbackPool = []) {
  const batchCorrects = batch.map(b => b.correct);
  return shuffle(batch).map(b => {
    // 同じ英単語の別義を除外
    const others = batchCorrects.filter(c => c !== b.correct &&
      !batch.some(other => other.word === b.word && other.correct === c));
    const pool = others.length >= 3 ? others : [
      ...others,
      ...fallbackPool.filter(c =>
        !batchCorrects.includes(c) &&
        !batch.some(other => other.word === b.word && other.correct === c)
      )
    ];
    const wrongs = shuffle(pool).slice(0, 3);
    return { word: b.word, correct: b.correct, imageFile: b.imageFile || '', choices: shuffle([b.correct, ...wrongs]) };
  });
}
